<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>GUR-V1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0e;--s1:#111118;--s2:#18181f;--b1:#2a2a3a;--b2:#3a3a52;
  --t1:#f0f0ff;--t2:#8888aa;--t3:#606080;--gi:#707090;
  --kick:#ff3d5a;--snare:#ff8c00;--hats:#ffe040;--bass:#00e5a0;
  --chord:#40c8ff;--arp:#b060ff;--pad:#ff60b0;--lead:#60ffb0;
  --fh:'Bebas Neue',sans-serif;--fm:'Space Mono',monospace;
  --HDR:60px;--TOP:30px;--FTR:30px;
  --BODY:calc(100vh - var(--HDR) - var(--TOP) - var(--FTR));
  --RH:calc(var(--BODY)/8);
  --MX:33.33vw;--SQ:66.67vw;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);
  color:var(--t1);font-family:var(--fm);user-select:none;touch-action:none;}
#console{transform-origin:top left;overflow:hidden;position:relative;}

/* ── HEADER ───────────────────────────────────────────────── */
.hdr{height:var(--HDR);display:flex;align-items:center;gap:5px;padding:0 8px;
  background:var(--s1);border-bottom:1px solid var(--b1);position:relative;flex-shrink:0;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--kick),var(--snare),var(--hats),var(--bass),var(--chord),var(--arp),var(--pad),var(--lead));}
.brand{font-family:var(--fh);font-size:28px;letter-spacing:4px;
  background:linear-gradient(135deg,#fff,#aaa);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.hb{font-family:var(--fh);font-size:16px;letter-spacing:1px;padding:0 12px;
  height:34px;line-height:34px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.hb.on{background:#00e5a015;border-color:var(--bass);color:var(--bass);}
.hb.go{background:#ff3d5a18;border-color:var(--kick);color:var(--kick);}
.hb.rec-active{background:#ff3d5a22;border-color:#ff3d5a;color:#ff3d5a;
  animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.scl-grp{display:flex;gap:2px;flex-shrink:0;}
.scl-btn{font-family:var(--fh);font-size:13px;letter-spacing:.5px;padding:0 8px;
  height:28px;line-height:28px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);border-radius:2px;cursor:pointer;white-space:nowrap;}
.scl-btn.active{background:#b060ff22;border-color:var(--arp);color:var(--arp);}
/* BPM — drag/wheel only */
.bgrp{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--b2);
  padding:0 10px;height:34px;border-radius:2px;margin-left:auto;cursor:ns-resize;
  touch-action:none;user-select:none;}
.blbl{font-family:var(--fh);font-size:10px;color:var(--t2);letter-spacing:1px;}
.bval{font-family:var(--fh);font-size:18px;color:var(--hats);min-width:38px;text-align:center;}
 
/* ── TOP ROW ───────────────────────────────────────────────── */
.top{height:var(--TOP);display:flex;flex-shrink:0;border-bottom:1px solid var(--b1);}
.top-mx{width:var(--MX);flex-shrink:0;display:flex;align-items:center;gap:2px;
  padding:0 3px;background:var(--s1);border-right:1px solid var(--b1);overflow:hidden;}
.pat-btn{flex:1;height:20px;font-family:var(--fh);font-size:12px;
  background:var(--s2);border:1px solid var(--b2);color:var(--t2);
  border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;user-select:none;touch-action:none;}
.pat-btn.active{background:#40c8ff18;border-color:var(--chord);color:var(--chord);}
.pat-btn.filled::after{content:'';position:absolute;top:2px;right:2px;
  width:5px;height:5px;border-radius:50%;background:var(--hats);}
.pat-save-hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  background:#111118ee;border:1px solid var(--arp);border-radius:4px;
  padding:4px 12px;font-family:var(--fh);font-size:13px;color:var(--arp);
  pointer-events:none;z-index:998;display:none;letter-spacing:1px;}
.dup-popup{position:fixed;background:var(--s1);border:1px solid var(--chord);border-radius:4px;
  padding:6px 10px;z-index:999;display:none;box-shadow:0 4px 16px rgba(0,0,0,.6);}
.dup-popup .dup-msg{font-family:var(--fh);font-size:12px;color:var(--t1);letter-spacing:.5px;
  margin-bottom:5px;white-space:nowrap;}
.dup-popup .dup-btns{display:flex;gap:4px;}
.dup-popup .dup-btn{font-family:var(--fh);font-size:11px;padding:2px 10px;cursor:pointer;
  border-radius:2px;border:1px solid var(--b2);background:var(--s2);color:var(--t1);}
.dup-popup .dup-btn.yes{border-color:var(--chord);color:var(--chord);}
.dup-popup .dup-btn.no{border-color:var(--t3);color:var(--t2);}
.bank-btns{display:flex;gap:2px;flex-shrink:0;margin-left:2px;}
.bank-btn{font-family:var(--fh);font-size:11px;padding:0 5px;
  height:20px;line-height:20px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);border-radius:2px;cursor:pointer;white-space:nowrap;}
.bank-btn:active{background:var(--b2);}
.top-sq{flex:1;overflow-x:hidden;display:flex;align-items:center;background:var(--bg);position:relative;}
.anlz-overlay{position:absolute;right:0;top:calc(var(--HDR) + var(--TOP));bottom:var(--FTR);
  width:calc(var(--SQ) / 2);background:var(--bg);z-index:500;display:none;flex-direction:column;
  border-left:1px solid var(--b1);}
.anlz-overlay.open{display:flex;}
.anlz-panel{flex:1;display:flex;flex-direction:column;min-height:0;}
.anlz-panel+.anlz-panel{border-top:1px solid var(--b1);}
.anlz-bar{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;
  background:var(--s1);border-bottom:1px solid var(--b1);flex-shrink:0;}
.anlz-title{font-family:var(--fh);font-size:10px;letter-spacing:2px;color:var(--t2);}
.anlz-close{font-family:var(--fh);font-size:14px;color:var(--t2);cursor:pointer;line-height:1;}
.anlz-close:hover{color:var(--kick);}
.anlz-cv{flex:1;width:100%;display:block;}
.snum{font-family:var(--fh);font-size:11px;color:var(--b2);text-align:center;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.snum.b4{color:var(--t2);}
.snum.lit{color:var(--hats);text-shadow:0 0 8px var(--hats);}
.row-spacer{flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);}
 
/* ── BODY ─────────────────────────────────────────────────── */
.body{display:flex;height:var(--BODY);overflow:hidden;}
 
/* ── MIXER ────────────────────────────────────────────────── */
.mixer{width:var(--MX);flex-shrink:0;display:flex;flex-direction:column;
  background:var(--s1);border-right:1px solid var(--b1);overflow:hidden;}
.ch{height:var(--RH);display:flex;align-items:stretch;
  border-bottom:1px solid var(--b1);position:relative;overflow:hidden;flex-shrink:0;}
.ch::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cc);}
.ch.muted{opacity:.35;}
 
.ch-left{display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  width:40px;flex-shrink:0;padding:2px 0;border-right:1px solid var(--b1);}
.ch-name{font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--cc);
  writing-mode:vertical-lr;text-orientation:upright;flex:1;
  display:flex;align-items:center;justify-content:center;text-shadow:0 0 8px var(--cc);}
.ms-row{display:flex;flex-direction:column;gap:2px;align-items:center;flex-shrink:0;}
/* M=mute=yellow, S=solo=red */
.ms-btn{width:13px;height:10px;font-family:var(--fh);font-size:9px;font-weight:700;
  background:var(--b1);border:1px solid var(--b2);color:var(--t2);
  border-radius:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  letter-spacing:0;line-height:1;}
.ms-btn.mute-on{background:#ffe04022;border-color:var(--hats);color:var(--hats);}
.ms-btn.solo-on{background:#ff3d5a22;border-color:var(--kick);color:var(--kick);}
.ch-led{width:8px;height:8px;border-radius:50%;background:var(--b1);
  border:1px solid var(--b2);flex-shrink:0;margin-bottom:1px;transition:none;}
.ch-led.lit{background:var(--cc);box-shadow:0 0 8px var(--cc),0 0 16px var(--cc);}
 
/* Volume fader */
.vfdr{display:flex;flex-direction:column;align-items:center;
  width:40px;flex-shrink:0;padding:3px 0 2px;border-right:1px solid var(--b1);gap:1px;}
.vfdr-lbl{font-family:var(--fh);font-size:10px;color:var(--t2);letter-spacing:.5px;}
.vfdr-trk{position:relative;flex:1;width:20px;cursor:ns-resize;touch-action:none;
  display:flex;justify-content:center;}
.vfdr-rail{width:4px;height:100%;background:var(--b2);border-radius:2px;position:absolute;}
.vfdr-cap{position:absolute;left:50%;transform:translateX(-50%);
  width:20px;height:11px;background:var(--s2);border:1px solid var(--b2);
  border-top:2px solid var(--cc);border-radius:2px;cursor:ns-resize;}
.vfdr-val{font-family:var(--fh);font-size:10px;color:var(--cc);text-align:center;}
 
/* Steppers */
.stepper{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:26px;flex-shrink:0;padding:1px;gap:1px;}
.stepper-lbl{font-family:var(--fh);font-size:9px;color:var(--cc);letter-spacing:.2px;}
.stepper-btn{width:20px;height:12px;background:var(--b1);border:1px solid var(--b2);
  color:var(--t2);font-size:11px;cursor:pointer;border-radius:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);}
.stepper-num{font-family:var(--fh);font-size:11px;color:var(--cc);line-height:1;}
 
/* 8 knobs grid */
.knobs{flex:1;display:flex;gap:0;margin-right:2px;overflow:hidden;}
.ksec{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--b1);min-width:0;overflow:hidden;}
.ksec:last-child{border-right:none;}
.ksec-title{font-family:var(--fh);font-size:14px;color:var(--cc);letter-spacing:1px;font-weight:700;
  text-align:center;line-height:1;padding-top:7px;padding-bottom:5px;margin-bottom:0;flex-shrink:0;
  text-shadow:0 0 6px var(--cc);border-bottom:1px solid var(--b2);}
.ksec-body{display:flex;flex:1;align-items:center;justify-content:center;gap:4px;min-height:0;flex-wrap:wrap;}
.ksec-pgrs{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex-shrink:0;padding:0 1px;}
.ksec-pgrs.wide{flex-direction:row;}
.kw{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;min-width:0;}
.klbl{font-family:var(--fh);font-size:12px;color:var(--cc);text-align:center;
  letter-spacing:.3px;line-height:1;overflow:hidden;white-space:nowrap;width:100%;}
.kval-sm{font-family:var(--fh);font-size:11px;color:var(--t2);text-align:center;line-height:1;}
.pgr{display:flex;flex-direction:column;align-items:center;width:26px;gap:1px;}
.pgr-lbl{font-family:var(--fh);font-size:9px;color:var(--cc);letter-spacing:.3px;}
.pgr-btn{width:20px;height:12px;background:var(--b1);border:1px solid var(--b2);
  color:var(--t2);font-size:9px;cursor:pointer;border-radius:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);}
.pgr-val{font-family:var(--fh);font-size:11px;color:var(--cc);text-align:center;
  width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1;}
 
/* VU bulbs */
.vu-bulbs{width:8px;background:#060609;display:flex;flex-direction:column;
  gap:1px;padding:3px 1px;flex-shrink:0;}
.vu-bulb{flex:1;border-radius:2px;background:#1a1a22;}
.vu-bulb.lit.green{background:#00e060;box-shadow:0 0 4px #00e060,0 0 1px #00e060;}
.vu-bulb.lit.orange{background:#ff8c00;box-shadow:0 0 4px #ff8c00,0 0 1px #ff8c00;}
.vu-bulb.lit.red{background:#ff2020;box-shadow:0 0 5px #ff3030,0 0 2px #ff2020;}
 
/* ── SEQUENCER ───────────────────────────────────────────── */
.seq{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.sbody{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;position:relative;}
.srow{display:flex;align-items:stretch;height:var(--RH);border-bottom:1px solid var(--b1);}
.rlbl{flex-shrink:0;font-family:var(--fh);font-size:16px;letter-spacing:1px;
  display:flex;align-items:center;justify-content:center;
  writing-mode:vertical-lr;text-orientation:upright;
  padding:2px 0;border-right:1px solid var(--b1);background:var(--s1);}
.scell{flex-shrink:0;display:flex;flex-direction:column;
  padding:1px;gap:0;border-right:1px solid transparent;position:relative;}
.scell.bb{border-right:1px solid var(--b1);}
.scell.past{opacity:.18;}
.scell.lend>.son{border-right:2px solid var(--cc);}
 
/* ON button */
.son{background:#07070c;border:1px solid var(--b1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:2px;}
.son.on{background:var(--cc);border-color:var(--cc);box-shadow:0 0 6px var(--cc);}
.son.cur{outline:2px solid var(--cc);outline-offset:-2px;}
 
/* DEG display — drag/wheel only */
.deg-wrap{display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;touch-action:none;width:100%;background:var(--s2);border:1px solid var(--b1);}
.sdeg{font-family:var(--fh);font-size:11px;color:var(--cc);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;pointer-events:none;}
 
/* ACC button */
.sacc{cursor:pointer;font-family:var(--fh);font-size:9px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--b1);border-radius:1px;width:100%;}
.sacc.on{background:#ff3d5a20;border-color:var(--kick);color:var(--kick);}
 
/* CUT display — drag/wheel only */
.scut-wrap{display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;touch-action:none;width:100%;border:1px solid var(--b1);}
.scut{font-family:var(--fh);font-size:9px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;pointer-events:none;}
 
/* ── POPUP ──────────────────────────────────────────────── */
#popup{position:fixed;background:#111118ee;border:1px solid var(--cc2,#fff);
  border-radius:4px;padding:5px 12px;pointer-events:none;z-index:999;
  font-family:var(--fh);font-size:20px;color:var(--cc2,#fff);
  letter-spacing:2px;display:none;white-space:nowrap;
  box-shadow:0 0 14px var(--cc2,#fff4);}
 
/* ── FOOTER ─────────────────────────────────────────────── */
.ftr{height:var(--FTR);background:var(--s1);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 10px;gap:12px;
  font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--t2);flex-shrink:0;}
.fv{color:var(--hats);}
#smsg{margin-left:auto;font-size:11px;color:var(--t2);}

/* ── MIXDOWN DIALOG ────────────────────────────────────── */
.mdl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;
  display:none;align-items:center;justify-content:center;}
.mdl-overlay.open{display:flex;}
.mdl{background:var(--s1);border:1px solid var(--b2);border-radius:6px;
  width:380px;max-width:92vw;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 40px #000a;font-family:var(--fm);}
.mdl-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--b1);}
.mdl-hdr h2{font-family:var(--fh);font-size:18px;letter-spacing:2px;color:var(--t1);margin:0;}
.mdl-close{background:none;border:none;color:var(--t2);font-size:20px;
  cursor:pointer;padding:0 4px;line-height:1;}
.mdl-close:hover{color:var(--kick);}
.mdl-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.mdl-row{display:flex;flex-direction:column;gap:3px;}
.mdl-row label{font-family:var(--fh);font-size:11px;color:var(--t2);letter-spacing:1px;}
.mdl-row input,.mdl-row select{background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);font-family:var(--fm);font-size:12px;padding:5px 8px;
  border-radius:2px;outline:none;}
.mdl-row input:focus,.mdl-row select:focus{border-color:var(--chord);}
.mdl-row select{cursor:pointer;}
.mdl-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mdl-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;
  border-top:1px solid var(--b1);}
.mdl-btn{font-family:var(--fh);font-size:13px;letter-spacing:1px;padding:6px 16px;
  border:1px solid var(--b2);border-radius:2px;cursor:pointer;background:var(--s2);color:var(--t1);}
.mdl-btn:hover{background:var(--b1);}
.mdl-btn.primary{background:#00e5a022;border-color:var(--bass);color:var(--bass);}
.mdl-btn.primary:hover{background:#00e5a033;}
.mdl-info{font-family:var(--fm);font-size:10px;color:var(--t2);padding:2px 0;}

/* ── THEME OVERRIDES ─────────────────────────────────── */
.theme-btn{display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;flex-shrink:0;padding:2px;}
.theme-swatch{width:22px;height:14px;border-radius:3px;border:2px solid transparent;transition:border-color .15s;}
.theme-label{font-family:var(--fh);font-size:9px;letter-spacing:.5px;color:var(--t3);transition:color .15s;}
.theme-btn.active .theme-swatch{border-color:var(--t1);}
.theme-btn.active .theme-label{color:var(--t1);}
body.vintage{background:var(--bg) repeating-linear-gradient(
  87deg,transparent 0px,transparent 4px,rgba(0,0,0,.06) 4px,rgba(0,0,0,.06) 5px) !important;}
body.vintage .hdr,body.vintage .mixer,body.vintage .ch-left,body.vintage .ftr{
  background:var(--s1) repeating-linear-gradient(
  85deg,transparent 0px,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px) !important;}

/* ── SNOW THEME BLUE ACCENTS ─────────────────────────────── */
body.snow .brand{background:none;-webkit-text-fill-color:#fff;color:#fff;}
body.snow .hdr{background:#becfde;border-bottom-color:#8aaac8;}
body.snow .hdr::after{background:linear-gradient(90deg,#4a8ab8,#6aaad8,#4a8ab8,#8aaac8,#4a8ab8,#6aaad8,#4a8ab8,#8aaac8);}
body.snow .ftr{background:#becfde;border-top-color:#8aaac8;}
body.snow .ksec{border-color:#9ab4c8;}
body.snow .ksec-title{color:#2a5878;text-shadow:none;}
body.snow .srow:nth-child(odd){background:#c8d8e4;}
body.snow .rlbl{background:var(--s1);border-right-color:#8aaac8;}
</style>
</head>
<body>
<div id="console">
<!-- HEADER -->
<div class="hdr">
  <div class="brand">GUR-V1</div>
  <button class="hb on"  id="initBtn" onclick="startAudio()">▸ INIT</button>
  <button class="hb"     onclick="newProject()">NEW</button>
  <button class="hb"     onclick="saveProject()">SAVE</button>
  <button class="hb"     onclick="loadBank()">LOAD</button>
  <button class="hb"     id="playBtn" onclick="togglePlay()" disabled>▶ PLAY</button>
  <button class="hb"     id="recBtn"  onclick="toggleRec()">⏺ REC</button>
  <button class="hb"     onclick="doRandom()">⟳ RND</button>
  <div class="scl-grp" id="sclGrp"></div>
  <div class="scl-grp" id="themeGrp"></div>
  <div id="masterVolWrap" style="display:flex;align-items:center;gap:4px;margin-left:8px;"></div>
  <!-- BPM: drag or wheel only -->
  <div class="bgrp" id="bpmDrag">
    <span class="blbl">BPM</span>
    <span class="bval" id="bpmVal">132</span>
  </div>
  <button class="hb" id="anlzBtn" onclick="toggleAnlz()">ANLZ</button>
</div>
 
<!-- TOP ROW -->
<div class="top">

function d2f(deg,octKey){
  const oct=Math.round(OCT[octKey]||3);
  const sc=SCALES[scaleKey];
  const root=21+oct*12;
  const sz=sc.size;
  const o2=Math.floor(deg/sz);
  const idx=((deg%sz)+sz)%sz;
  return 440*Math.pow(2,(root+o2*12+sc.steps[idx]-69)/12);
}
 
function applyScale(){
  const sz=SCALES[scaleKey].size;
  stepCells.forEach((row,ci)=>{

      const c=row[s];if(!c)continue;
      const v=seqState.deg[ci][s];
      const clamped=Math.max(-(sz-1),Math.min(sz-1,v));
      seqState.deg[ci][s]=clamped;
      c.degVal=clamped;
      if(c.degEl)c.degEl.textContent=clamped;

}

function autoClean(sources,nodes){
  // FIX #5: race-safe cleanup — disconnect after ALL sources end OR fallback timeout
  let remaining=sources.length;
  let cleaned=false;
  function doClean(){
    if(cleaned)return;cleaned=true;
    setTimeout(()=>{nodes.forEach(n=>{try{n.disconnect();}catch(e){}});},80);
  }
  if(remaining===0){doClean();return;}
  sources.forEach(s=>s.addEventListener('ended',()=>{
    remaining--;
    if(remaining<=0)doClean();
  },{once:true}));
  // FIX #5: fallback — if 'ended' never fires, clean up after max note duration
  const maxDur=sources.reduce((mx,s)=>{
    try{const d=s.buffer?s.buffer.duration:10;return Math.max(mx,d);}catch(e){return mx;}
  },10);
  setTimeout(doClean,(maxDur+1)*1000);
}

// FIX #14: safe time guard — ensures envelope scheduling never targets the past

function mkDly(g,nodes){
  if(g<=.005)return null;

function mkRvb(g,nodes){
  if(g<=.005)return null;

}
function mkStereo(wid,pan,nodes){
  // Haas-effect stereo widener + panner
  // wid 0→mono, 1→full wide (25ms Haas delay L vs R)
  // pan -1→left … 0→center … 1→right
  const mg=ctx.createChannelMerger(2);
  const pn=ctx.createStereoPanner();
  pn.pan.value=Math.max(-1,Math.min(1,pan||0));
  const dl=ctx.createDelay(0.04);
  dl.delayTime.value=Math.max(0,Math.min(1,wid||0))*0.025;
  dl.connect(mg,0,1);   // delayed copy → right channel
  mg.connect(pn);
  nodes.push(mg,pn,dl);
  return{mg,dl,out:pn};
}
 
async function generateDrumSamples(){

  drumSamples.kick[0]=await renderBuf(0.6,off=>{
    const o=off.createOscillator();o.type='sine';
    o.frequency.setValueAtTime(160,0);o.frequency.exponentialRampToValueAtTime(40,0.5);
    const g=off.createGain();g.gain.setValueAtTime(0.9,0);g.gain.linearRampToValueAtTime(0.9,0.01);g.gain.exponentialRampToValueAtTime(0.0001,0.55);

    o.connect(ws);ws.connect(g);g.connect(off.destination);o.start(0);o.stop(0.55);
  });

function unlock(){
  if(!ctx)return;
  if(ctx.state==='suspended')ctx.resume();
  try{const b=ctx.createBuffer(1,1,ctx.sampleRate),s=ctx.createBufferSource();
    s.buffer=b;s.connect(ctx.destination);s.start(0);}catch(e){}
}
 
async function startAudio(){
  if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();
  unlock();try{await ctx.resume();}catch(e){}
  if(ready)return;
  mComp=ctx.createDynamicsCompressor();
  mComp.threshold.value=-14;mComp.ratio.value=4;mComp.attack.value=.005;mComp.release.value=.15;
  mGain=ctx.createGain();mGain.gain.value=P.masterVol||.8;
  mComp.connect(mGain);mGain.connect(ctx.destination);
  anlzNode=ctx.createAnalyser();anlzNode.fftSize=4096;anlzNode.smoothingTimeConstant=0.82;
  mGain.connect(anlzNode);

  anlzSplit.connect(anlzL,0);anlzSplit.connect(anlzR,1);

  const dH=ctx.createBiquadFilter();dH.type='highpass';dH.frequency.value=250;

  rvbNode=ctx.createConvolver();rvbNode.buffer=mkIR(2.2,.22);
  rvbGain=ctx.createGain();rvbGain.gain.value=.44;
  rvbNode.connect(rvbGain);rvbGain.connect(mComp);
  await generateDrumSamples();
  // Pre-generate shared noise buffer (1 second) to avoid per-trigger allocation
  const _nLen=ctx.sampleRate;
  _noiseCache=ctx.createBuffer(1,_nLen,ctx.sampleRate);
  const _nD=_noiseCache.getChannelData(0);
  for(let i=0;i<_nLen;i++)_nD[i]=Math.random()*2-1;
  // Pre-generate chord saturation curve
  {const n=256;_chordSatCurve=new Float32Array(n);for(let i=0;i<n;i++){const x=(i*2/n-1)*1.2;_chordSatCurve[i]=Math.tanh(x)/Math.tanh(1.2);}}
  ready=true;
  const ib=document.getElementById('initBtn');
  if(ib){ib.textContent='● LIVE';ib.classList.remove('on');ib.classList.add('go');ib.onclick=null;}
  document.getElementById('playBtn').disabled=false;
  document.getElementById('recBtn').disabled=false;
  setMsg('READY · TAP PLAY');
}
 
function mkIR(dur,dc){
  const sr=ctx.sampleRate||44100;
  const n=Math.floor(sr*dur),buf=ctx.createBuffer(2,n,sr);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dc*8);}
  return buf;
}
function setDT(b){if(dlyNode)dlyNode.delayTime.value=(60/b)*.75;}
 
// Ladder filter — Q=0 when res=0; quadratic curve to Q=28 at res=1 (extreme peak on bass/arp/lead)
function mkLad(f,r,nodes){
  const qVal=Math.max(0,r)*r*28;
  const s=[];
  for(let i=0;i<4;i++){
    const fl=ctx.createBiquadFilter();fl.type='lowpass';
    fl.frequency.value=Math.min(18000,Math.max(30,f));
    fl.Q.value=i===3?qVal:0; // only last stage gets Q
    s.push(fl);nodes.push(fl);
  }
  for(let i=0;i<3;i++)s[i].connect(s[i+1]);
  return s;
}
function swLad(s,f,r,t,ef,et){
  const dur=Math.max(et-t,.001);
  const qVal=Math.max(0,r)*r*28;
  s.forEach((x,i)=>{
    const fv=Math.min(18e3,Math.max(30,f));
    const efv=Math.min(18e3,Math.max(30,ef));
    x.frequency.cancelScheduledValues(t);
    x.frequency.setValueAtTime(fv,t);
    if(Math.abs(fv-efv)>.1)x.frequency.exponentialRampToValueAtTime(efv,t+dur);
    // FIX #7: use AudioParam scheduling API for Q to avoid glitches on running nodes
    if(i===3)x.Q.setValueAtTime(qVal,t);
  });
}
function mkTanh(d,nodes){
  const w=ctx.createWaveShaper();w.oversample='2x';
  const n=256,c=new Float32Array(n);
  const dSafe=Math.max(.01,d);
  for(let i=0;i<n;i++){const x=(i*2/n-1)*dSafe;c[i]=Math.tanh(x)/Math.tanh(dSafe);}
  w.curve=c;nodes.push(w);return w;
}
 
function addChorus(source,amount,nodes,stopTime){
  if(amount<=.005)return source;
  const g1=ctx.createGain(),g2=ctx.createGain();
  const d1=ctx.createDelay(.02),d2=ctx.createDelay(.02);
  const lf1=ctx.createOscillator(),lf2=ctx.createOscillator();
  const lg1=ctx.createGain(),lg2=ctx.createGain();
  lf1.type='sine';lf2.type='sine';
  lf1.frequency.value=.8;lf2.frequency.value=1.1;
  lg1.gain.value=0.005*amount;lg2.gain.value=0.007*amount;
  g1.gain.value=.5;g2.gain.value=.5;
  source.connect(d1);source.connect(d2);source.connect(g1);
  lf1.connect(lg1);lg1.connect(d1.delayTime);
  lf2.connect(lg2);lg2.connect(d2.delayTime);
  d1.connect(g1);d2.connect(g2);
  const now=ctx.currentTime;
  lf1.start(now);lf2.start(now);
  // FIX #6: stop chorus LFOs at note end to prevent leaking oscillators
  if(stopTime){lf1.stop(stopTime);lf2.stop(stopTime);}
  const out=ctx.createGain();out.gain.value=1;
  g1.connect(out);g2.connect(out);
  nodes.push(g1,g2,d1,d2,lf1,lf2,lg1,lg2,out);
  return out;
}

function trigKickSample(t){
  if(!ready||P.kickAmp<=.001)return;
  const buf=drumSamples.kick[kickMode-1];if(!buf)return;
  const nodes=[];
  const src=ctx.createBufferSource();src.buffer=buf;
  // PTCH controls playback rate
  src.playbackRate.value=Math.pow(2,(P.kickPitch-65)/24);
  const dr=mkTanh(P.kickDrive,nodes);
  // SUB boost: lowshelf
  const subBoost=ctx.createBiquadFilter();subBoost.type='lowshelf';subBoost.frequency.value=80;subBoost.gain.value=P.kickSub*18;nodes.push(subBoost);

  const og=ctx.createGain();og.gain.value=P.kickAmp*1.1;nodes.push(og);
  src.connect(dr);dr.connect(subBoost);subBoost.connect(eqL);eqL.connect(og);og.connect(mComp);
  const rv=mkRvb(P.kickReverb,nodes);if(rv)eqL.connect(rv);

}
function trigKick(t){

  const nodes=[];
  const sf=Math.max(20,440*Math.pow(2,(P.kickPitch-69)/12));
  const ef=Math.max(20,440*Math.pow(2,((P.kickPitch-25)-69)/12));

  const bo=ctx.createOscillator();bo.type='sine';
  bo.frequency.setValueAtTime(sf,t);bo.frequency.exponentialRampToValueAtTime(ef,t+.07);
  const be=ctx.createGain();nodes.push(be);
  be.gain.setValueAtTime(0,t);be.gain.linearRampToValueAtTime(1,t+.005);
  be.gain.exponentialRampToValueAtTime(.0001,t+dur);

  const subE=ctx.createGain();nodes.push(subE);

  const og=ctx.createGain();og.gain.value=P.kickAmp*1.1;nodes.push(og);
  bo.connect(be);sub.connect(subE);cs.connect(cf);cf.connect(ce);

// Hats: deg=0→16th(1 hit), deg=1→32nd(2 hits=rolls), deg=2→64th (triplet feel)
// ACC is linked to knob 2 (O.DC) value — when ACC on, use open hat sound
function trigHatSample(t,subdiv,isAcc){
  if(!ready||P.hatsAmp<=.001)return;
  const buf=drumSamples.hats[hatsMode-1];if(!buf)return;
  const stepDuration=sDur();
  const offsets=subdiv===1?[0,stepDuration*.5]:subdiv===2?[0,stepDuration/3,stepDuration*2/3]:[0];
  offsets.forEach(offset=>{
    const tt=t+offset;
    const isOpen=isAcc;
    const nodes=[];
    const d=Math.max(.005,isOpen?P.hatDecO:P.hatDecC);
    const src=ctx.createBufferSource();src.buffer=buf;
    // TONE controls filter center, SPC controls spectral focus (Q)
    const bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=Math.max(500,P.hatTone);bp.Q.value=0.3+P.hatSpec*3.5;nodes.push(bp);
    // HIGH EQ: variable high-shelf
    const eqH=ctx.createBiquadFilter();eqH.type='highshelf';eqH.frequency.value=Math.max(2000,P.hatEqF);eqH.gain.value=(P.hatEqA||0)*18;nodes.push(eqH);
    const en=ctx.createGain();nodes.push(en);
    const hatk=Math.max(.001,P.hatAtk||.003);
    en.gain.setValueAtTime(0,tt);en.gain.linearRampToValueAtTime(Math.max(.0001,P.hatsAmp*.92),tt+hatk);en.gain.exponentialRampToValueAtTime(.0001,tt+d);
    src.connect(bp);bp.connect(eqH);eqH.connect(en);
    const {mg:hMg,dl:hDl,out:hOut}=mkStereo(P.hatWid,P.hatPan,nodes);
    en.connect(hMg,0,0);en.connect(hDl);hOut.connect(mComp);
    const dg=mkDly(P.hatDly,nodes);if(dg)en.connect(dg);
    const rv=mkRvb(isOpen?P.hatVerb*.5:0,nodes);if(rv)en.connect(rv);
    src.start(tt);
    autoClean([src],nodes);
  });
}
function trigHat(t,subdiv,isAcc){
  if(hatsMode>0){trigHatSample(t,subdiv,isAcc);return;}

  const stepDuration=sDur();
  const offsets=subdiv===1?[0,stepDuration*.5]:
                subdiv===2?[0,stepDuration/3,stepDuration*2/3]:
                [0];
  offsets.forEach(offset=>{
    const tt=t+offset;
    const isOpen=isAcc; // ACC = open hat
    const nodes=[];
    const d=Math.max(.005,isOpen?P.hatDecO:P.hatDecC);
    const ns=ctx.createBufferSource();ns.buffer=_noiseCache;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=Math.max(500,P.hatTone);bp.Q.value=0.3+P.hatSpec*3.5;nodes.push(bp);
    // HIGH EQ: variable high-shelf
    const eqH=ctx.createBiquadFilter();eqH.type='highshelf';eqH.frequency.value=Math.max(2000,P.hatEqF);eqH.gain.value=(P.hatEqA||0)*18;nodes.push(eqH);
    const cg=ctx.createGain();cg.gain.value=Math.max(1,P.hatCrush);nodes.push(cg);
    const cw=ctx.createWaveShaper();nodes.push(cw);
    const crushKey=Math.round(P.hatCrush*10);
    if(!_hatCrushCurves[crushKey]){
      const cc2=new Float32Array(256);
      for(let i=0;i<256;i++){const x=i*2/255-1;cc2[i]=Math.max(-1,Math.min(1,x*P.hatCrush))/Math.max(1,P.hatCrush);}
      _hatCrushCurves[crushKey]=cc2;
    }
    cw.curve=_hatCrushCurves[crushKey];
    const en=ctx.createGain();nodes.push(en);
    const hatk=Math.max(.001,P.hatAtk||.003);
    en.gain.setValueAtTime(0,tt);en.gain.linearRampToValueAtTime(Math.max(.0001,P.hatsAmp*.92),tt+hatk);
    en.gain.exponentialRampToValueAtTime(.0001,tt+d);
    ns.connect(bp);bp.connect(eqH);eqH.connect(cg);cg.connect(cw);cw.connect(en);
    const {mg:hMg,dl:hDl,out:hOut}=mkStereo(P.hatWid,P.hatPan,nodes);
    en.connect(hMg,0,0);en.connect(hDl);hOut.connect(mComp);
    const dg=mkDly(P.hatDly,nodes);if(dg)en.connect(dg);
    const rv=mkRvb(isOpen?P.hatVerb*.5:0,nodes);if(rv)en.connect(rv);
    ns.start(tt);ns.stop(tt+d+.08);
    autoClean([ns],nodes);
  });
}
 
function trigBass(t,freq,cs){
  if(!ready||P.bassAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.bassDec);
  const freqSafe=Math.max(18,freq);
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),o3=ctx.createOscillator();
  // FIX #3: use setValueAtTime before exponentialRamp to avoid scheduling conflicts
  const bwt=['sawtooth','square','triangle','sine'][bassWT]||'sawtooth';
  const bFine=P.bassFine||0;
  [o1,o2,o3].forEach((o,i)=>{
    o.type=bwt;
    if(i===1)o.detune.value=2+bFine;else if(i===2)o.detune.value=-1.5+bFine;else o.detune.value=bFine;
    o.frequency.setValueAtTime(Math.max(18,bsSlide),t);
    o.frequency.exponentialRampToValueAtTime(freqSafe,t+.04);
  });
  bsSlide=freqSafe;
  const mx=ctx.createGain();mx.gain.value=.36;nodes.push(mx);
  const cutB=Math.max(30,P.bassCut+(cs/127)*4000),pk=Math.min(18e3,cutB+P.bassEnv);
  const la=mkLad(pk,P.bassRes,nodes);swLad(la,pk,P.bassRes,t,Math.max(30,cutB),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(1,t+.015);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.08);
  const dr=mkTanh(P.bassDrv*1.4,nodes);
  const og=ctx.createGain();og.gain.value=P.bassAmp*.88;nodes.push(og);
  [o1,o2,o3].forEach(o=>o.connect(mx));mx.connect(dr);dr.connect(la[0]);la[3].connect(ae);ae.connect(og);
  const bStopT=t+d+.25;
  const cho=addChorus(og,P.bassCho,nodes,bStopT);cho.connect(mComp);
  const rg=mkRvb(P.bassVerb*.7,nodes);if(rg)ae.connect(rg);
  [o1,o2,o3].forEach(o=>{o.start(t);o.stop(bStopT);});
  autoClean([o1,o2,o3],nodes);
}
 
function trigChord(t,freq,cs){
  if(!ready||P.chordAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.1,P.chordDec);
  const isFM=(chordHarm===HARM_FM_IDX);
  const isRING=(chordHarm===HARM_RING_IDX);
  const isSYNC=(chordHarm===HARM_SYNC_IDX);
  const harmAmt=P.chordHarmAmt||0;
  const dlyAmt=P.chordDly||0;
  const fmRatio=Math.max(0.1,P.chordFmFreq||2);
  const freqSafe=Math.max(18,freq);
  const intervals=[0,7,12];

  // Base: 3 sine oscillators (root, 5th, octave)
  const srcOscs=intervals.map(semi=>{
    const o=ctx.createOscillator();
    o.type='sine';
    o.frequency.value=freqSafe*Math.pow(2,semi/12);
    return o;
  });

  // Modulation layer
  let harmOscs=[];
  let fmMods=[];
  let ringGains=[];

  if(harmAmt>0.005){
    if(isFM){
      harmOscs=intervals.map((semi,vi)=>{
        const carrierF=freqSafe*Math.pow(2,semi/12);
        const mod=ctx.createOscillator();mod.type='sine';
        mod.frequency.value=Math.max(1,carrierF*fmRatio);
        mod.detune.value=0;
        const modGain=ctx.createGain();
        modGain.gain.value=carrierF*harmAmt*4;
        nodes.push(modGain);
        mod.connect(modGain);
        fmMods.push({modGain,vi});
        return mod;
      });
    } else if(isRING){
      // Ring mod: saw modulator drives gain of sine carrier
      harmOscs=intervals.map((semi,vi)=>{
        const carrierF=freqSafe*Math.pow(2,semi/12);
        const mod=ctx.createOscillator();mod.type='sawtooth';
        mod.frequency.value=Math.max(1,carrierF*fmRatio);
        const modAmt=ctx.createGain();
        modAmt.gain.value=harmAmt;
        nodes.push(modAmt);
        mod.connect(modAmt);
        // ringGain: carrier passes through, gain controlled by modulator
        const rg=ctx.createGain();rg.gain.value=0;nodes.push(rg);
        srcOscs[vi].connect(rg);
        modAmt.connect(rg.gain);
        ringGains.push({rg,vi});
        return mod;
      });
    } else if(isSYNC){
      // Sync approx: saw at sync freq FM-modulates sine carrier
      harmOscs=intervals.map((semi,vi)=>{
        const carrierF=freqSafe*Math.pow(2,semi/12);
        const syncOsc=ctx.createOscillator();syncOsc.type='sawtooth';
        syncOsc.frequency.value=Math.max(1,carrierF*fmRatio);
        const syncGain=ctx.createGain();
        syncGain.gain.value=carrierF*harmAmt*6;
        nodes.push(syncGain);
        syncOsc.connect(syncGain);
        fmMods.push({modGain:syncGain,vi});
        return syncOsc;
      });
    } else {
      // Additive harmony
      const pw=buildWave(ctx,chordHarm);
      harmOscs=intervals.map((semi)=>{
        const f=freqSafe*Math.pow(2,semi/12);
        const o=ctx.createOscillator();
        o.setPeriodicWave(pw);
        o.frequency.value=f;
        o.detune.value=0;
        return o;
      });
    }
  }

  // Mixing
  const srcMx=ctx.createGain();
  const harmMx=ctx.createGain();
  const mx=ctx.createGain();mx.gain.value=1;
  nodes.push(srcMx,harmMx,mx);

  if(isRING&&harmAmt>0.005){
    // For ring mod: dry sine + ring-mod output
    srcMx.gain.value=(1-harmAmt)*0.3;
    harmMx.gain.value=harmAmt*0.3;
    srcOscs.forEach(o=>o.connect(srcMx));
    srcMx.connect(mx);
    ringGains.forEach(({rg})=>{rg.connect(harmMx);});
    harmMx.connect(mx);
  } else {
    srcMx.gain.value=(1-harmAmt*0.5)*0.3;
    harmMx.gain.value=harmAmt*0.3;
    fmMods.forEach(({modGain,vi})=>{modGain.connect(srcOscs[vi].frequency);});
    srcOscs.forEach(o=>o.connect(srcMx));
    srcMx.connect(mx);
    if(harmOscs.length&&!isRING){harmOscs.forEach(o=>o.connect(harmMx));harmMx.connect(mx);}
  }

  // Filter
  const cutV=Math.max(30,Math.min(18e3,P.chordCut+(cs/127)*2000));
  const peakCut=Math.min(18e3,cutV+P.chordEnv);
  const la=mkLad(peakCut,0,nodes);
  swLad(la,peakCut,0,t,cutV,t+d*.6);

  // Amplitude envelope
  const en=ctx.createGain();nodes.push(en);
  const atk=Math.max(.005,P.chordAtk||.01);
  en.gain.setValueAtTime(0,t);en.gain.linearRampToValueAtTime(P.chordAmp,t+atk);
  en.gain.exponentialRampToValueAtTime(.0001,t+atk+d);

  // Saturation (uses pre-cached curve)
  const dr=ctx.createWaveShaper();nodes.push(dr);
  dr.curve=_chordSatCurve;

  mx.connect(dr);dr.connect(la[0]);la[3].connect(en);

  // FX routing
  const stopT=t+atk+d+.4;
  const cho=addChorus(en,P.chordCho,nodes,stopT);
  const {mg:cMg,dl:cDl,out:cOut}=mkStereo(P.chordWid,P.chordPan,nodes);
  cho.connect(cMg,0,0);cho.connect(cDl);cOut.connect(mComp);
  const rg2=mkRvb(P.chordVerb,nodes);if(rg2)en.connect(rg2);
  const dg=mkDly(dlyAmt,nodes);if(dg)en.connect(dg);

  // Start / stop
  const allOscs=[...srcOscs,...harmOscs];
  allOscs.forEach(o=>{o.start(t);o.stop(stopT);});
  autoClean(allOscs,nodes);
}
 
function makePWMWave(duty){
  const N=64;
  const real=new Float32Array(N),imag=new Float32Array(N);
  const d=Math.max(0.05,Math.min(0.95,duty));
  for(let n=1;n<N;n++) imag[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*d);
  return ctx.createPeriodicWave(real,imag,{disableNormalization:false});
}

function trigArp(t,freq,cs){
  if(!ready||P.arpAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.arpDec);
  const freqSafe=Math.max(18,freq);
  const isSQR=(arpWT===1);
  const oc=ctx.createOscillator();
  if(isSQR){
    const pw=Math.max(0.05,Math.min(0.95,P.arpPWM||0.5));
    oc.setPeriodicWave(makePWMWave(pw));
  } else {
    oc.type='sawtooth';
  }
  oc.frequency.value=freqSafe;
  const pk=Math.min(18e3,Math.max(30,P.arpCut+(cs/127)*5000+P.arpEnv));
  const la=mkLad(pk,P.arpRes,nodes);swLad(la,pk,P.arpRes,t,Math.max(30,P.arpCut),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(P.arpAmp*.82,t+.003);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.03);
  oc.connect(la[0]);la[3].connect(ae);
  const aStopT=t+d+.08;
  const cho=addChorus(ae,P.arpCho,nodes,aStopT);
  const {mg:aMg,dl:aDl,out:aOut}=mkStereo(P.arpWid,P.arpPan,nodes);
  cho.connect(aMg,0,0);cho.connect(aDl);aOut.connect(mComp);
  const dg=mkDly(P.arpDly,nodes);if(dg)ae.connect(dg);
  const rg=mkRvb(P.arpVerb*.6,nodes);if(rg)ae.connect(rg);
  oc.start(t);oc.stop(aStopT);
  autoClean([oc],nodes);
}
 
function trigPad(t,freq,cs){
  if(!ready||P.padAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.1,P.padDec),atk=P.padAtk;
  const freqSafe=Math.max(18,freq);
  const fineRatio=Math.pow(2,(P.padFine||0)/1200);
  // Build wavetable from selected preset
  const wt=PAD_WAVETABLES[padWTIdx];
  const size=2048;
  const real=new Float32Array(size),imag=new Float32Array(size);
  wt.h.forEach(([p,a])=>{const i=Math.round(p);if(i>0&&i<size)real[i]=a;});
  const pw=ctx.createPeriodicWave(real,imag,{disableNormalization:false});
  // 6 detuned voices
  const fs=[.994,1.006,1.005*.997,1.005*1.003,2.003*.998,2.003*1.002];
  const os=fs.map(f=>{
    const o=ctx.createOscillator();
    o.setPeriodicWave(pw);
    o.frequency.value=freqSafe*f*fineRatio;
    return o;
  });
  const mx=ctx.createGain();mx.gain.value=.18;nodes.push(mx);
  const cutV=Math.min(18e3,Math.max(30,P.padCut+(cs/127)*4000));
  const fi=ctx.createBiquadFilter();fi.type='lowpass';fi.frequency.value=cutV;
  fi.Q.setValueAtTime(Math.max(0,P.padRes)*8,t);nodes.push(fi);
  const lf=ctx.createOscillator();lf.type='sine';lf.frequency.value=Math.max(.01,P.padLFO);
  const lg=ctx.createGain();lg.gain.value=200;nodes.push(lg);
  lf.connect(lg);lg.connect(fi.frequency);
  const en=ctx.createGain();nodes.push(en);
  en.gain.setValueAtTime(0,t);en.gain.linearRampToValueAtTime(Math.max(.0001,P.padAmp*.78),t+atk);
  en.gain.exponentialRampToValueAtTime(.0001,t+atk+d+.5);
  os.forEach(o=>o.connect(mx));mx.connect(fi);fi.connect(en);
  const stopT=t+atk+d+1.0;
  const cho=addChorus(en,P.padCho,nodes,stopT);
  const {mg:pMg,dl:pDl,out:pOut}=mkStereo(P.padWid,P.padPan,nodes);
  cho.connect(pMg,0,0);cho.connect(pDl);pOut.connect(mComp);
  const dg=mkDly(P.padDly*.8,nodes);if(dg)en.connect(dg);
  const rg=mkRvb(P.padVerb*.7,nodes);if(rg)en.connect(rg);
  const allOscs=[...os,lf];
  allOscs.forEach(o=>{o.start(t);o.stop(stopT);});
  autoClean(allOscs,nodes);
}
 
function trigLead(t,freq,cs,acc){
  if(!ready||P.leadAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.leadDec);
  const freqSafe=Math.max(18,freq);
  const lwt=['sawtooth','square','triangle','sine'][leadWT]||'sawtooth';

  // Osc1 (main, with portamento)
  const o1=ctx.createOscillator();
  o1.type=lwt;
  o1.frequency.setValueAtTime(Math.max(18,ldSlide),t);
  o1.frequency.exponentialRampToValueAtTime(freqSafe,t+.04);
  ldSlide=freqSafe;

  // Osc2 (second osc, frequency relative to note via TUNE2+FINE2)
  const tune2Cents=(P.leadTune2||0)*100; // semitones → cents
  const fine2Cents=(P.leadFine2||0);
  const osc2Freq=Math.max(18,freqSafe*Math.pow(2,(tune2Cents+fine2Cents)/1200));
  const o2=ctx.createOscillator();
  o2.type=lwt;
  o2.frequency.value=osc2Freq;

  const mx=ctx.createGain();mx.gain.value=.55;nodes.push(mx);

  if(leadOsc2Mode===0){
    // MIX: both oscs mixed
    o1.connect(mx);o2.connect(mx);
  } else if(leadOsc2Mode===1){
    // SYNC: o2 (sync master) FM-modulates o1's frequency; o1 outputs audio
    const syncGain=ctx.createGain();
    syncGain.gain.value=freqSafe*1.5;
    nodes.push(syncGain);
    o2.connect(syncGain);
    syncGain.connect(o1.frequency);
    o1.connect(mx);
  } else {
    // RING: o1 * o2 = ring modulation; o2 drives gain of o1
    const ringGain=ctx.createGain();
    ringGain.gain.value=0;
    nodes.push(ringGain);
    o1.connect(ringGain);
    o2.connect(ringGain.gain);
    // Mix ring output with dry o1
    const dryG=ctx.createGain();dryG.gain.value=.4;nodes.push(dryG);
    o1.connect(dryG);dryG.connect(mx);
    ringGain.connect(mx);
  }

  const pk=Math.min(18e3,Math.max(30,P.leadCut+(cs/127)*5000+P.leadEnv+(acc?P.leadEnv*.5:0)));
  const la=mkLad(pk,P.leadRes,nodes);swLad(la,pk,P.leadRes,t,Math.max(30,P.leadCut),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(P.leadAmp*(acc?1.4:1),t+.005);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.06);
  mx.connect(la[0]);la[3].connect(ae);
  const lStopT=t+d+.15;
  const cho=addChorus(ae,P.leadCho,nodes,lStopT);cho.connect(mComp);
  const dg=mkDly(P.leadDly,nodes);if(dg)ae.connect(dg);
  const rg=mkRvb(P.leadVerb*.6,nodes);if(rg)ae.connect(rg);
  [o1,o2].forEach(o=>{o.start(t);o.stop(lStopT);});
  autoClean([o1,o2],nodes);
}
 
/* ═══════════════════════════════════════════════════════════
   SCHEDULER
═══════════════════════════════════════════════════════════ */
let bpm=132,nst=0,schedTimer=null;
function sDur(){return(60/bpm)/4;}
 
function fireNote(ci,s,t){
  const anySolo=soloState.some(Boolean);
  if(anySolo&&!soloState[ci])return;
  if(!anySolo&&muteState[ci])return;
  if(!seqState.on[ci][s])return;
  const deg=seqState.deg[ci][s],acc=seqState.acc[ci][s],cut=seqState.cut[ci][s];
  if(ci===0)trigKick(t);
  else if(ci===1)trigSnare(t);
  else if(ci===2)trigHat(t,deg,acc); // deg=subdiv, acc=open/closed
  else if(ci===3)trigBass(t,d2f(deg,'bassOct'),cut);
  else if(ci===4)trigChord(t,d2f(deg,'chordOct'),cut);
  else if(ci===5)trigArp(t,d2f(deg,'arpOct'),cut);
  else if(ci===6)trigPad(t,d2f(deg,'padOct'),cut);
  else if(ci===7)trigLead(t,d2f(deg,'leadOct'),cut,acc);
  const ms=Math.max(0,(t-ctx.currentTime)*1000);
  const volKey=PD[CH[ci].id][0][1];
  setTimeout(()=>{vuPeaks[ci]=P[volKey]||0;},ms);
  const led=ledEls[ci];
  if(led)setTimeout(()=>{led.classList.add('lit');setTimeout(()=>led.classList.remove('lit'),90);},ms);
  const row=stepCells[ci];
  if(row){
    setTimeout(()=>{
      if(row._p!=null&&row[row._p])row[row._p].son.classList.remove('cur');
      if(row[s]){row[s].son.classList.add('cur');row._p=s;}
    },ms);
  }
}
 
function scheduler(){
  if(!playing||!ctx)return;
  if(ctx.state==='suspended')ctx.resume();
  while(nst<ctx.currentTime+.12){
    for(let ci=0;ci<8;ci++){
      const s=chStep[ci]%chLen[ci];
      fireNote(ci,s,nst);
    }
    for(let ci=0;ci<8;ci++)chStep[ci]++;
    const s0=(chStep[0]-1)%chLen[0],t2=nst;
    setTimeout(()=>{if(playing)document.getElementById('fStep').textContent=s0+1;},
      Math.max(0,(t2-ctx.currentTime)*1000));
    nst+=sDur();
  }
  schedTimer=setTimeout(scheduler,25);
}
 
function startSeq(){
  for(let ci=0;ci<8;ci++)chStep[ci]=0;
  nst=ctx.currentTime+.05;
  if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
  schedTimer=setTimeout(scheduler,0);
}
function stopSeq(){
  if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
  // FIX #2: reset portamento slides so first note after stop doesn't sweep from stale freq
  bsSlide=55;ldSlide=110;
  document.getElementById('fStep').textContent='--';
  stepCells.forEach(row=>{
    if(!row)return;
    for(let k in row){if(row[k]&&row[k].son)row[k].son.classList.remove('cur');}
    row._p=null;
  });
  CH.forEach((_,ci)=>{const l=ledEls[ci];if(l)l.classList.remove('lit');});
}
 
const vuPeaks=new Float32Array(8);
let vuRaf=null;
function startVU(){
  if(vuRaf)return;
  function p(){
    if(!playing){CH.forEach((_,ci)=>{vuPeaks[ci]=0;setVU(ci,0);});vuRaf=null;return;}
    CH.forEach((_,ci)=>{
      setVU(ci,vuPeaks[ci]);
      vuPeaks[ci]*=0.82;
    });
    vuRaf=requestAnimationFrame(p);
  }
  vuRaf=requestAnimationFrame(p);
}
function stopVU(){
  if(vuRaf){cancelAnimationFrame(vuRaf);vuRaf=null;}
  CH.forEach((_,ci)=>setVU(ci,0));
}
const VU_CFG=[['red',0],['orange',-3],['orange',-6],['green',-12],['green',-18],['green',-24],['green',-30],['green',-36],['green',-42],['green',-48],['green',-54],['green',-60]];
function setVU(ci,lv){
  const el=vuEls[ci];if(!el)return;
  const db=lv>0.0001?20*Math.log10(lv):-Infinity;
  const bulbs=el.children;
  for(let i=0;i<12;i++)bulbs[i].classList.toggle('lit',db>=VU_CFG[i][1]);
}

   RECORDING & MIXDOWN EXPORT
═══════════════════════════════════════════════════════════ */
function toggleRec(){
  startAudio().then(()=>{
    if(!ready)return;
    const btn=document.getElementById('recBtn');
    if(!isRecording){
      recLeft=[];recRight=[];isRecording=true;
      // Connect ScriptProcessor only while recording to avoid idle CPU drain
      try{mGain.connect(scriptProc);scriptProc.connect(ctx.destination);}catch(e){}
      btn.textContent='■ REC';btn.classList.add('rec-active');setMsg('RECORDING...');
    }else{
      isRecording=false;
      // Disconnect ScriptProcessor when not recording
      try{scriptProc.disconnect();mGain.disconnect(scriptProc);}catch(e){}
      btn.textContent='⏺ REC';btn.classList.remove('rec-active');
      openMixdownDialog();
    }
  });
}

function openMixdownDialog(){
  let totalSamples=0;for(let i=0;i<recLeft.length;i++)totalSamples+=recLeft[i].length;
  const dur=totalSamples/(ctx.sampleRate||44100);
  const mins=Math.floor(dur/60),secs=Math.floor(dur%60);
  document.getElementById('mdInfo').textContent=
    'Duration: '+mins+'m '+secs+'s · '+Math.round(ctx.sampleRate)+'Hz stereo';
  document.getElementById('mdFileName').value='GUR-V1_Mix_'+new Date().toISOString().slice(0,10);
  document.getElementById('mdYear').value=new Date().getFullYear();
  updateQualityVis();
  document.getElementById('mixdownOverlay').classList.add('open');
  setMsg('CONFIGURE EXPORT');
}
function closeMixdown(){
  document.getElementById('mixdownOverlay').classList.remove('open');
  if(recLeft.length>0)setMsg('EXPORT CANCELLED — audio kept, tap REC to discard');
}

  const fmt=document.getElementById('mdFormat').value;

// FIX #8b: flatten chunked recording buffers into single Float32Arrays
function flattenChunks(chunks){
  let total=0;
  for(let i=0;i<chunks.length;i++)total+=chunks[i].length;
  const out=new Float32Array(total);
  let off=0;
  for(let i=0;i<chunks.length;i++){out.set(chunks[i],off);off+=chunks[i].length;}
  return out;
}

/* ── WAV export with ID3-like metadata in LIST/INFO chunk ── */
function exportWAV(name,tags){
  const sr=ctx.sampleRate||44100;
  const flatL=flattenChunks(recLeft),flatR=flattenChunks(recRight);
  const nSamples=flatL.length;
  const bps=16, nCh=2;
  const blockAlign=nCh*(bps/8);
  const dataSize=nSamples*blockAlign;

  // Build LIST INFO chunk for metadata
  const infoEntries=[];
  if(tags.title)  infoEntries.push(['INAM',tags.title]);
  if(tags.artist) infoEntries.push(['IART',tags.artist]);
  if(tags.album)  infoEntries.push(['IPRD',tags.album]);
  if(tags.year)   infoEntries.push(['ICRD',tags.year]);
  if(tags.genre)  infoEntries.push(['IGNR',tags.genre]);
  if(tags.track)  infoEntries.push(['ITRK',tags.track]);
  if(tags.comment)infoEntries.push(['ICMT',tags.comment]);
  infoEntries.push(['ISFT','GUR-V1 Deep Techno Machine']);

  let infoPayloadSize=4; // 'INFO'
  const encodedEntries=infoEntries.map(([id,val])=>{
    const enc=new TextEncoder().encode(val+'\0');
    const padded=enc.length%2!==0?new Uint8Array([...enc,0]):enc;
    infoPayloadSize+=8+padded.length; // 4(id)+4(size)+data
    return{id,data:padded,rawLen:enc.length};
  });
  const hasInfo=infoEntries.length>0;
  const listChunkSize=hasInfo?8+infoPayloadSize:0; // 'LIST'+size+payload

  const fileSize=36+dataSize+(hasInfo?listChunkSize:0);
  const buf=new ArrayBuffer(8+fileSize);
  const v=new DataView(buf);
  let o=0;
  function ws(s){for(let i=0;i<s.length;i++)v.setUint8(o++,s.charCodeAt(i));}
  function w32(n){v.setUint32(o,n,true);o+=4;}
  function w16(n){v.setInt16(o,n,true);o+=2;}

  ws('RIFF');w32(fileSize);ws('WAVE');
  ws('fmt ');w32(16);w16(1);w16(nCh);w32(sr);w32(sr*blockAlign);w16(blockAlign);w16(bps);
  ws('data');w32(dataSize);

  for(let i=0;i<nSamples;i++){
    const l=Math.max(-1,Math.min(1,flatL[i])),r=Math.max(-1,Math.min(1,flatR[i]));
    w16(l<0?l*0x8000:l*0x7FFF);
    w16(r<0?r*0x8000:r*0x7FFF);
  }

  // LIST INFO chunk
  if(hasInfo){
    ws('LIST');w32(infoPayloadSize);ws('INFO');
    encodedEntries.forEach(({id,data,rawLen})=>{
      ws(id);w32(rawLen);
      const arr=new Uint8Array(buf,o,data.length);
      arr.set(data);o+=data.length;
    });
  }

  const blob=new Blob([buf],{type:'audio/wav'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'.wav';a.click();URL.revokeObjectURL(a.href);
  setMsg('WAV EXPORTED');
  recLeft=[];recRight=[];
}

/* ── MP3 export with ID3v2 tags ── */
function exportMP3(name,kbps,tags){
  const flatL=flattenChunks(recLeft),flatR=flattenChunks(recRight);
  const mp3enc=new lamejs.Mp3Encoder(2,ctx.sampleRate,kbps);
  const mp3Data=[];const bs=1152;
  for(let i=0;i<flatL.length;i+=bs){
    const end=Math.min(i+bs,flatL.length);
    const lc=new Int16Array(end-i),rc=new Int16Array(end-i);
    for(let j=i;j<end;j++){lc[j-i]=Math.round(flatL[j]<0?flatL[j]*32768:flatL[j]*32767);rc[j-i]=Math.round(flatR[j]<0?flatR[j]*32768:flatR[j]*32767);}
    const enc=mp3enc.encodeBuffer(lc,rc);if(enc.length>0)mp3Data.push(new Int8Array(enc));
  }
  const fl=mp3enc.flush();if(fl.length>0)mp3Data.push(new Int8Array(fl));

  // Build ID3v2.3 header
  const id3=buildID3v2(tags);
  const finalParts=[id3,...mp3Data];
  const blob=new Blob(finalParts,{type:'audio/mpeg'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'.mp3';a.click();URL.revokeObjectURL(a.href);
  setMsg('MP3 EXPORTED ('+kbps+'kbps)');
  recLeft=[];recRight=[];
}

/* ── ID3v2.3 tag builder ── */
function buildID3v2(tags){
  const frames=[];
  function addText(id,text){
    if(!text)return;
    const enc=new TextEncoder().encode(text);
    // frame: 4-byte ID, 4-byte size, 2-byte flags, 1-byte encoding(0=ISO), then string
    const size=1+enc.length;
    const frame=new Uint8Array(10+size);
    for(let i=0;i<4;i++)frame[i]=id.charCodeAt(i);
    frame[4]=(size>>24)&0xff;frame[5]=(size>>16)&0xff;
    frame[6]=(size>>8)&0xff;frame[7]=size&0xff;
    frame[8]=0;frame[9]=0; // flags
    frame[10]=0; // encoding: ISO-8859-1
    frame.set(enc,11);
    frames.push(frame);
  }
  addText('TIT2',tags.title);
  addText('TPE1',tags.artist);
  addText('TALB',tags.album);
  addText('TDRC',tags.year);     // recording year
  addText('TYER',tags.year);     // ID3v2.3 year
  addText('TCON',tags.genre);
  addText('TRCK',tags.track);
  // COMM frame requires special structure (lang+desc+text); use TXXX for comment instead
  if(tags.comment){
    const enc=new TextEncoder().encode(tags.comment);
    // TXXX: encoding(0) + description(\0) + value
    const desc=new TextEncoder().encode('COMMENT\0');
    const size=1+desc.length+enc.length;
    const frame=new Uint8Array(10+size);
    for(let i=0;i<4;i++)frame[i]='TXXX'.charCodeAt(i);
    frame[4]=(size>>24)&0xff;frame[5]=(size>>16)&0xff;
    frame[6]=(size>>8)&0xff;frame[7]=size&0xff;
    frame[10]=0; // encoding: ISO-8859-1
    frame.set(desc,11);frame.set(enc,11+desc.length);
    frames.push(frame);
  }
  addText('TSSE','GUR-V1 Deep Techno Machine');

  let totalFrameSize=0;
  frames.forEach(f=>totalFrameSize+=f.length);

  // ID3v2 header: 10 bytes
  // "ID3" + version(2,3) + flags(0) + syncsafe size
  const header=new Uint8Array(10);
  header[0]=0x49;header[1]=0x44;header[2]=0x33; // "ID3"
  header[3]=3;header[4]=0; // v2.3
  header[5]=0; // flags
  // Syncsafe integer encoding for size
  const sz=totalFrameSize;
  header[6]=(sz>>21)&0x7f;header[7]=(sz>>14)&0x7f;
  header[8]=(sz>>7)&0x7f;header[9]=sz&0x7f;

  const result=new Uint8Array(10+totalFrameSize);
  result.set(header,0);
  let off=10;
  frames.forEach(f=>{result.set(f,off);off+=f.length;});
  return result;
}

function togglePlay(){
  unlock();
  if(!ready){startAudio().then(()=>{if(ready)togglePlay();});return;}
  playing=!playing;
  const btn=document.getElementById('playBtn');
  btn.textContent=playing?'■ STOP':'▶ PLAY';

  else{stopSeq();stopVU();setMsg('STOPPED');}
}

  setDT(bpm);

function doRandom(){
  const sz=SCALES[scaleKey].size;
  const bassOn=[],bassDeg=[];
  for(let s=0;s<32;s++){
    if(s>=chLen[3]){bassOn.push(0);bassDeg.push(0);continue;}
    const on=Math.random()<.5?1:0;bassOn.push(on);
    bassDeg.push(on?Math.floor(Math.random()*(sz*2+1))-sz:0);
  }
  for(let s=0;s<chLen[0];s++){
    const bIdx=(s+2)%chLen[3];
    seqState.on[0][s]=bassOn[bIdx];seqState.deg[0][s]=0;
    const c0=stepCells[0]?.[s];if(c0)c0.son.classList.toggle('on',!!seqState.on[0][s]);
  }
  for(let s=0;s<chLen[3];s++){
    seqState.on[3][s]=bassOn[s];seqState.deg[3][s]=bassDeg[s];
    const c=stepCells[3]?.[s];
    if(c){c.son.classList.toggle('on',!!seqState.on[3][s]);c.degEl.textContent=seqState.deg[3][s];}
  }
  for(let ci=4;ci<8;ci++){
    for(let s=0;s<32;s++){
      if(s>=chLen[ci])continue;
      if(Math.random()<.22){
        seqState.on[ci][s]^=1;
        if(seqState.on[ci][s])seqState.deg[ci][s]=Math.floor(Math.random()*(sz*2+1))-sz;
        const c=stepCells[ci]?.[s];
        if(c){c.son.classList.toggle('on',!!seqState.on[ci][s]);c.degEl.textContent=seqState.deg[ci][s];}
      }
    }
  }
  setMsg('RANDOM');
}

/* ═══════════════════════════════════════════════════════════
   CANVAS KNOB — 3D rendered, theme-aware, pointer capture
═══════════════════════════════════════════════════════════ */
const KS=0.75*Math.PI,KE=2.25*Math.PI,KR=KE-KS;
function makeKnob(parent,lbl,key,mn,mx2,df,ci,sz,colOverride){
  const wrap=document.createElement('div');wrap.className='kw';
  const lb=document.createElement('div');lb.className='klbl';lb.textContent=lbl;
  lb.style.fontSize=Math.max(10,sz*.38)+'px';
  const dpr=window.devicePixelRatio||1;
  const cv=document.createElement('canvas');
  cv.width=Math.round(sz*dpr);cv.height=Math.round(sz*dpr);
  cv.style.cssText=`width:${sz}px;height:${sz}px;touch-action:none;cursor:ns-resize;display:block;`;
  const vl=document.createElement('div');vl.className='kval-sm';
  wrap.appendChild(lb);wrap.appendChild(cv);wrap.appendChild(vl);
  parent.appendChild(wrap);
  let norm=(df-mn)/(mx2-mn);

  function draw(){
    const col=colOverride||CH[ci].c;
    const th=THEMES[currentTheme].knob;
    const s=cv.width,cx=s/2,cy=s/2,r=s/2-3*dpr;
    const c=cv.getContext('2d');c.clearRect(0,0,s,s);
    c.save();
    const ang=KS+norm*KR;
    const lw=Math.max(2,3*dpr);

    // Shadow beneath knob
    c.beginPath();c.arc(cx,cy+1.5*dpr,r*.82,0,Math.PI*2);
    c.fillStyle=th.shadow;c.fill();

    // Outer bezel ring
    c.beginPath();c.arc(cx,cy,r*.88,0,Math.PI*2);
    const bz=c.createLinearGradient(cx-r,cy-r,cx+r,cy+r);
    bz.addColorStop(0,th.bezel[0]);bz.addColorStop(.5,th.bezel[1]);bz.addColorStop(1,th.bezel[2]);
    c.fillStyle=bz;c.fill();

    // Knob body — 3D dome
    c.beginPath();c.arc(cx,cy,r*.72,0,Math.PI*2);
    const bg=c.createRadialGradient(cx-r*.12,cy-r*.18,r*.04,cx,cy,r*.72);
    bg.addColorStop(0,th.body[0]);bg.addColorStop(.55,th.body[1]);bg.addColorStop(1,th.body[2]);
    c.fillStyle=bg;c.fill();

    // Brushed metal texture for vintage
    if(th.metal){
      c.save();c.globalAlpha=.12;
      c.beginPath();c.arc(cx,cy,r*.70,0,Math.PI*2);c.clip();
      for(let a=0;a<Math.PI*2;a+=.18){
        c.beginPath();c.moveTo(cx,cy);
        c.lineTo(cx+r*.72*Math.cos(a),cy+r*.72*Math.sin(a));
        c.strokeStyle='#fff';c.lineWidth=.5*dpr;c.stroke();
      }
      c.restore();
    }

    // Arc track (background)
    c.beginPath();c.arc(cx,cy,r,KS,KE);
    c.strokeStyle=th.track;c.lineWidth=lw;c.lineCap='round';c.stroke();

    // Active arc (colored)
    if(norm>.001){
      c.beginPath();c.arc(cx,cy,r,KS,ang);
      c.strokeStyle=col;c.lineWidth=lw;c.lineCap='round';c.stroke();
    }

    // Indicator line (offset from center)
    const indStart=r*.32,indEnd=r*.68;
    c.beginPath();
    c.moveTo(cx+indStart*Math.cos(ang),cy+indStart*Math.sin(ang));
    c.lineTo(cx+indEnd*Math.cos(ang),cy+indEnd*Math.sin(ang));
    c.strokeStyle=col;c.lineWidth=Math.max(1.5,2*dpr);c.lineCap='round';c.stroke();

    // Glow dot at indicator tip
    if(th.glow){
      c.shadowColor=col;c.shadowBlur=6*dpr;
    }
    c.beginPath();
    c.arc(cx+indEnd*Math.cos(ang),cy+indEnd*Math.sin(ang),2*dpr,0,Math.PI*2);
    c.fillStyle=col;c.fill();
    c.shadowBlur=0;

    c.restore();
    lb.style.color=col;
  }

  function fmt(v){return v<10?v.toFixed(2):v<1000?Math.round(v):(v/1000).toFixed(1)+'k';}
  function setV(n,fromDrag){
    norm=Math.max(0,Math.min(1,n));
    const rv=mn+norm*(mx2-mn);P[key]=rv;
    vl.textContent=fmt(rv);draw();
    if(fromDrag)showPop(lbl,fmt(rv),CH[ci].c,cv);
  }
  setV(norm);

  uiRefresh.push(()=>{
    const rv=P[key]||df;
    norm=Math.max(0,Math.min(1,(rv-mn)/(mx2-mn)));
    vl.textContent=fmt(rv);draw();
  });

  let active=false,startY=0,startN=0;
  cv.addEventListener('pointerdown',e=>{active=true;startY=e.clientY;startN=norm;cv.setPointerCapture(e.pointerId);e.preventDefault();});
  cv.addEventListener('pointermove',e=>{if(active){const s=e.ctrlKey?900:90;setV(startN-(e.clientY-startY)/s,true);}});
  cv.addEventListener('pointerup',()=>{active=false;});
  cv.addEventListener('pointercancel',()=>{active=false;});
  cv.addEventListener('wheel',e=>{e.preventDefault();const step=e.ctrlKey?.002:.02;setV(norm-(e.deltaY>0?step:-step),true);},{passive:false});
  cv.addEventListener('dblclick',()=>setV((df-mn)/(mx2-mn)));
  return{setV,draw};
}

function buildMixer(){
  const wrap=document.getElementById('mixerEl');
  const h=DESIGN_H||window.innerHeight;
  const chH=Math.floor((h-60-30-30)/8);
  const kSz=Math.max(12,Math.min(32,Math.floor(chH/3.0)-10));
 
  CH.forEach((ch,ci)=>{
    const div=document.createElement('div');div.className='ch';div.style.setProperty('--cc',ch.c);
    chDivEls[ci]=div;
 
    // Left: name + M/S + LED
    const left=document.createElement('div');left.className='ch-left';
    const nm=document.createElement('div');nm.className='ch-name';nm.textContent=ch.n;left.appendChild(nm);
    const msr=document.createElement('div');msr.className='ms-row';
    const mB=document.createElement('div');mB.className='ms-btn';mB.textContent='M';
    const sB=document.createElement('div');sB.className='ms-btn';sB.textContent='S';
    msr.appendChild(mB);msr.appendChild(sB);left.appendChild(msr);
    // M=mute=yellow, S=solo=red
    mB.addEventListener('click',()=>{muteState[ci]=!muteState[ci];mB.classList.toggle('mute-on',muteState[ci]);updateMuteVis();});
    sB.addEventListener('click',()=>{soloState[ci]=!soloState[ci];sB.classList.toggle('solo-on',soloState[ci]);updateMuteVis();});
    const led=document.createElement('div');led.className='ch-led';left.appendChild(led);ledEls[ci]=led;
    div.appendChild(left);

    uiRefresh.push(()=>{
      mB.classList.toggle('mute-on',muteState[ci]);
      sB.classList.toggle('solo-on',soloState[ci]);
    });
 
    // VOL fader — starts at 50%
    const vf=document.createElement('div');vf.className='vfdr';
    const vlbl=document.createElement('div');vlbl.className='vfdr-lbl';vlbl.textContent='VOL';
    const vt=document.createElement('div');vt.className='vfdr-trk';vt.style.touchAction='none';
    const vr=document.createElement('div');vr.className='vfdr-rail';
    const vc=document.createElement('div');vc.className='vfdr-cap';
    const vv=document.createElement('div');vv.className='vfdr-val';
    vt.appendChild(vr);vt.appendChild(vc);vf.appendChild(vlbl);vf.appendChild(vt);vf.appendChild(vv);div.appendChild(vf);
    const[,vKey,vMin,vMax]=PD[ch.id][0];
    const tH=Math.max(22,chH-34);vt.style.height=tH+'px';
    let vN=.5;P[vKey]=vMin+vN*(vMax-vMin);
    function setVol(n,fd){
      vN=Math.max(0,Math.min(1,n));P[vKey]=vMin+vN*(vMax-vMin);
      vc.style.top=((1-vN)*(tH-11))+'px';
      const sv=P[vKey].toFixed(2);vv.textContent=sv;
      if(fd)showPop('VOL',sv,ch.c,vt);
    }
    setVol(vN);

    uiRefresh.push(()=>{
      const rv=P[vKey];
      vN=Math.max(0,Math.min(1,(rv-vMin)/(vMax-vMin)));
      vc.style.top=((1-vN)*(tH-11))+'px';
      vv.textContent=rv.toFixed(2);
    });

    let vA=false,vY=0,vS=0;
    vt.addEventListener('pointerdown',e=>{vA=true;vY=e.clientY;vS=vN;vt.setPointerCapture(e.pointerId);e.preventDefault();});
    vt.addEventListener('pointermove',e=>{if(vA){const s=e.ctrlKey?(tH-11)*10:(tH-11);setVol(vS-(e.clientY-vY)/s,true);}});
    vt.addEventListener('pointerup',()=>vA=false);vt.addEventListener('pointercancel',()=>vA=false);
    vt.addEventListener('wheel',e=>{e.preventDefault();const step=e.ctrlKey?.003:.03;setVol(vN-(e.deltaY>0?step:-step),true);},{passive:false});
 
    // Knobs — 4 sections: VCO | VCF | ENV | FX
    const SNAMES=['VCO','VCF','ENV','FX'];
    const SWIDTHS=['35%','20%','20%','25%'];
    const kg=document.createElement('div');kg.className='knobs';div.appendChild(kg);

  vintage:['#281e12','#4a3420'],

function buildThemeSelector(){
  const grp=document.getElementById('themeGrp');
  Object.entries(THEMES).forEach(([key,theme])=>{
    const btn=document.createElement('div');
    btn.className='theme-btn'+(key===currentTheme?' active':'');
    btn.dataset.theme=key;
    const sw=document.createElement('div');sw.className='theme-swatch';
    const cols=THEME_SWATCHES[key]||['#888','#444'];
    sw.style.background=`linear-gradient(135deg,${cols[0]} 50%,${cols[1]} 50%)`;
    const lbl=document.createElement('div');lbl.className='theme-label';lbl.textContent=theme.name;

function setTheme(name){
  currentTheme=name;
  const theme=THEMES[name];
  const root=document.documentElement;
  // Apply CSS custom properties
  Object.entries(theme.css).forEach(([prop,val])=>{
    root.style.setProperty(prop,val);
  });
  // Update CH colors to match theme
  CH.forEach(ch=>{ch.c=theme.css['--'+ch.id];});
  // Body class for theme-specific CSS
  document.body.className=name==='vintage'?'vintage':name==='snow'?'snow':'';
  // Update channel strip --cc colors
  chDivEls.forEach((el,ci)=>{if(el)el.style.setProperty('--cc',CH[ci].c);});
  // Redraw all knobs + UI
  uiRefresh.forEach(fn=>fn());seqRefresh.forEach(fn=>fn());
  // Update theme buttons
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.theme===name);
  });
  // Rebuild seq to pick up new colors
  buildSeqRows();
}

let DESIGN_W=0,DESIGN_H=0;
function initScale(){
  DESIGN_W=window.innerWidth;
  DESIGN_H=window.innerHeight;
  // Lock CSS vars to fixed pixel values so transform scaling works correctly
  const r=document.documentElement.style;
  r.setProperty('--MX',Math.floor(DESIGN_W*0.3333)+'px');
  r.setProperty('--SQ',Math.floor(DESIGN_W*0.6667)+'px');
  const bodyH=DESIGN_H-60-30-30;
  r.setProperty('--BODY',bodyH+'px');
  r.setProperty('--RH',Math.floor(bodyH/8)+'px');
  // Set console to exact design size
  const con=document.getElementById('console');
  if(con){con.style.width=DESIGN_W+'px';con.style.height=DESIGN_H+'px';}
}
function updateScale(){
  if(!DESIGN_W)return;
  const con=document.getElementById('console');
  if(!con)return;
  const sx=window.innerWidth/DESIGN_W;
  const sy=window.innerHeight/DESIGN_H;
  con.style.transform=`scale(${sx},${sy})`;
}

// ── Analyzer overlays ──────────────────────────────────────────────
let anlzRAF={freq:null,scope:null};
// Pre-allocated analyzer buffers (created once on first use)
let _freqBuf=null,_scopeBufL=null,_scopeBufR=null;
function toggleAnlz(){
  if(!anlzNode){alert('Initialize audio first (press INIT)');return;}
  const ov=document.getElementById('anlzOverlay');
  const open=ov.classList.toggle('open');
  document.getElementById('anlzBtn').classList.toggle('on',open);
  if(open){drawFreq();drawVector();}
  else{
    if(anlzRAF.freq){cancelAnimationFrame(anlzRAF.freq);anlzRAF.freq=null;}
    if(anlzRAF.scope){cancelAnimationFrame(anlzRAF.scope);anlzRAF.scope=null;}
  }
}
function drawFreq(){
  const cv=document.getElementById('freqCanvas');
  const W=cv.clientWidth,H=cv.clientHeight;
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const g=cv.getContext('2d');
  if(!_freqBuf||_freqBuf.length!==anlzNode.frequencyBinCount)_freqBuf=new Uint8Array(anlzNode.frequencyBinCount);
  anlzNode.getByteFrequencyData(_freqBuf);
  const buf=_freqBuf;
  const fMin=25,fMax=25600;
  const nyq=ctx.sampleRate/2;
  const fftSz=anlzNode.fftSize;
  g.clearRect(0,0,W,H);
  const gr=g.createLinearGradient(0,H,0,0);
  gr.addColorStop(0,'#001a0d');gr.addColorStop(0.55,'#00e5a0');gr.addColorStop(1,'#40c8ff');
  g.fillStyle=gr;
  // 30 equal log-spaced bars, 1px gap between each
  const nBars=30,gap=1;
  const barW=(W-gap*(nBars-1))/nBars;
  for(let i=0;i<nBars;i++){
    const f1=fMin*Math.pow(fMax/fMin,i/nBars);
    const f2=fMin*Math.pow(fMax/fMin,(i+1)/nBars);
    if(f1>nyq)break;
    const b1=Math.max(0,Math.round(f1*fftSz/ctx.sampleRate));
    const b2=Math.min(buf.length-1,Math.round(Math.min(f2,nyq)*fftSz/ctx.sampleRate));
    let sum=0,cnt=0;
    for(let b=b1;b<=b2;b++){sum+=buf[b];cnt++;}
    const avg=cnt>0?sum/cnt:0;
    if(avg<4)continue; // suppress noise floor
    const bh=(avg/255)*H;
    const x=i*(barW+gap);
    g.fillRect(x,H-bh,barW,bh);
  }
  // Grid
  g.lineWidth=1;
  [25,50,100,200,500,1000,2000,5000,10000,20000].forEach(f=>{
    if(f>nyq)return;
    const x=Math.log(f/fMin)/Math.log(fMax/fMin)*W;
    if(x<0||x>W)return;
    g.strokeStyle='rgba(255,255,255,0.07)';
    g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke();
    g.fillStyle='rgba(255,255,255,0.28)';g.font='8px monospace';
    g.fillText(f>=1000?(f/1000)+'k':f+'',x+2,H-3);
  });
  const ov=document.getElementById('anlzOverlay');
  if(ov.classList.contains('open')) anlzRAF.freq=requestAnimationFrame(drawFreq);
}
function drawVector(){
  const cv=document.getElementById('scopeCanvas');
  const W=cv.clientWidth,H=cv.clientHeight;
  if(cv.width!==W||cv.height!==H){cv.width=W;cv.height=H;}
  const g=cv.getContext('2d');
  if(!anlzL||!anlzR){anlzRAF.scope=requestAnimationFrame(drawVector);return;}
  if(!_scopeBufL||_scopeBufL.length!==anlzL.fftSize)_scopeBufL=new Float32Array(anlzL.fftSize);
  if(!_scopeBufR||_scopeBufR.length!==anlzR.fftSize)_scopeBufR=new Float32Array(anlzR.fftSize);
  const bufL=_scopeBufL,bufR=_scopeBufR;
  anlzL.getFloatTimeDomainData(bufL);
  anlzR.getFloatTimeDomainData(bufR);
  // Phosphor persistence: fade with theme background
  const isLight=document.body.classList.contains('snow');
  g.fillStyle=isLight?'rgba(200,208,218,0.22)':'rgba(8,8,12,0.22)';
  g.fillRect(0,0,W,H);
  // Reference lines
  const cx=W/2,cy=H/2;
  g.strokeStyle='rgba(255,255,255,0.06)';g.lineWidth=1;
  g.beginPath();g.moveTo(cx,0);g.lineTo(cx,H);g.stroke(); // 90° mono reference (vertical)
  g.beginPath();g.moveTo(0,cy);g.lineTo(W,cy);g.stroke();
  // L and R channel reference lines (45° diagonals)
  g.strokeStyle='rgba(255,255,255,0.04)';
  g.beginPath();g.moveTo(cx,cy);g.lineTo(0,0);g.stroke();
  g.beginPath();g.moveTo(cx,cy);g.lineTo(W,0);g.stroke();
  // Goniometer: rotate 45° so mono (L=R) → vertical, anti-phase → horizontal
  const len=Math.min(bufL.length,bufR.length);
  // Compute RMS to suppress noise floor
  let rms=0;
  for(let i=0;i<len;i++)rms+=bufL[i]*bufL[i]+bufR[i]*bufR[i];
  rms=Math.sqrt(rms/(len*2));
  if(rms>0.0008){
    g.strokeStyle='#b060ff';g.lineWidth=1.2;
    g.shadowColor='#b060ff';g.shadowBlur=5;
    g.beginPath();
    for(let i=0;i<len;i++){
      const l=bufL[i],r=bufR[i];
      const x=cx+(l-r)*cx*0.92*0.7071;
      const y=cy-(l+r)*cy*0.92*0.7071;
      i===0?g.moveTo(x,y):g.lineTo(x,y);
    }
    g.stroke();
    g.shadowBlur=0;
  }
  const ov=document.getElementById('anlzOverlay');
  if(ov.classList.contains('open')) anlzRAF.scope=requestAnimationFrame(drawVector);
}
