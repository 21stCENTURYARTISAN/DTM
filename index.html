<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>GUR-V1</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0a0a0e;--s1:#111118;--s2:#18181f;--b1:#2a2a3a;--b2:#3a3a52;
  --t1:#f0f0ff;--t2:#8888aa;--t3:#606080;--gi:#707090;
  --kick:#ff3d5a;--snare:#ff8c00;--hats:#ffe040;--bass:#00e5a0;
  --chord:#40c8ff;--arp:#b060ff;--pad:#ff60b0;--lead:#60ffb0;
  --fh:'Bebas Neue',sans-serif;--fm:'Space Mono',monospace;
  --HDR:40px;--TOP:30px;--FTR:22px;
  --BODY:calc(100vh - var(--HDR) - var(--TOP) - var(--FTR));
  --RH:calc(var(--BODY)/8);
  --MX:33.33vw;--SQ:66.67vw;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);
  color:var(--t1);font-family:var(--fm);user-select:none;touch-action:none;}
#console{transform-origin:top left;overflow:hidden;}

/* ── HEADER ───────────────────────────────────────────────── */
.hdr{height:var(--HDR);display:flex;align-items:center;gap:5px;padding:0 8px;
  background:var(--s1);border-bottom:1px solid var(--b1);position:relative;flex-shrink:0;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--kick),var(--snare),var(--hats),var(--bass),var(--chord),var(--arp),var(--pad),var(--lead));}
.brand{font-family:var(--fh);font-size:22px;letter-spacing:4px;
  background:linear-gradient(135deg,#fff,#aaa);-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;flex-shrink:0;}
.hb{font-family:var(--fh);font-size:14px;letter-spacing:1px;padding:0 9px;
  height:26px;line-height:26px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);border-radius:2px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.hb.on{background:#00e5a015;border-color:var(--bass);color:var(--bass);}
.hb.go{background:#ff3d5a18;border-color:var(--kick);color:var(--kick);}
.hb.rec-active{background:#ff3d5a22;border-color:#ff3d5a;color:#ff3d5a;
  animation:recpulse 1s infinite;}
@keyframes recpulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.scl-grp{display:flex;gap:2px;flex-shrink:0;}
.scl-btn{font-family:var(--fh);font-size:12px;letter-spacing:.5px;padding:0 7px;
  height:22px;line-height:22px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);border-radius:2px;cursor:pointer;white-space:nowrap;}
.scl-btn.active{background:#b060ff22;border-color:var(--arp);color:var(--arp);}
/* BPM — drag/wheel only */
.bgrp{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--b2);
  padding:0 8px;height:26px;border-radius:2px;margin-left:auto;cursor:ns-resize;
  touch-action:none;user-select:none;}
.blbl{font-family:var(--fh);font-size:10px;color:var(--t2);letter-spacing:1px;}
.bval{font-family:var(--fh);font-size:18px;color:var(--hats);min-width:38px;text-align:center;}
 
/* ── TOP ROW ───────────────────────────────────────────────── */
.top{height:var(--TOP);display:flex;flex-shrink:0;border-bottom:1px solid var(--b1);}
.top-mx{width:var(--MX);flex-shrink:0;display:flex;align-items:center;gap:2px;
  padding:0 3px;background:var(--s1);border-right:1px solid var(--b1);overflow:hidden;}
.pat-btn{flex:1;height:20px;font-family:var(--fh);font-size:12px;
  background:var(--s2);border:1px solid var(--b2);color:var(--t2);
  border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  position:relative;user-select:none;touch-action:none;}
.pat-btn.active{background:#40c8ff18;border-color:var(--chord);color:var(--chord);}
.pat-btn.filled::after{content:'';position:absolute;top:2px;right:2px;
  width:5px;height:5px;border-radius:50%;background:var(--hats);}
.pat-save-hint{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);
  background:#111118ee;border:1px solid var(--arp);border-radius:4px;
  padding:4px 12px;font-family:var(--fh);font-size:13px;color:var(--arp);
  pointer-events:none;z-index:998;display:none;letter-spacing:1px;}
.bank-btns{display:flex;gap:2px;flex-shrink:0;margin-left:2px;}
.bank-btn{font-family:var(--fh);font-size:11px;padding:0 5px;
  height:20px;line-height:20px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);border-radius:2px;cursor:pointer;white-space:nowrap;}
.bank-btn:active{background:var(--b2);}
.top-sq{flex:1;overflow-x:hidden;display:flex;align-items:center;background:var(--bg);}
.snum{font-family:var(--fh);font-size:11px;color:var(--b2);text-align:center;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.snum.b4{color:var(--t2);}
.snum.lit{color:var(--hats);text-shadow:0 0 8px var(--hats);}
.row-spacer{flex-shrink:0;background:var(--s1);border-right:1px solid var(--b1);}
 
/* ── BODY ─────────────────────────────────────────────────── */
.body{display:flex;height:var(--BODY);overflow:hidden;}
 
/* ── MIXER ────────────────────────────────────────────────── */
.mixer{width:var(--MX);flex-shrink:0;display:flex;flex-direction:column;
  background:var(--s1);border-right:1px solid var(--b1);overflow:hidden;}
.ch{height:var(--RH);display:flex;align-items:stretch;
  border-bottom:1px solid var(--b1);position:relative;overflow:hidden;flex-shrink:0;}
.ch::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--cc);}
.ch.muted{opacity:.35;}
 
.ch-left{display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  width:26px;flex-shrink:0;padding:2px 0;border-right:1px solid var(--b1);}
.ch-name{font-family:var(--fh);font-size:10px;letter-spacing:1px;color:var(--cc);
  writing-mode:vertical-rl;transform:rotate(180deg);flex:1;
  display:flex;align-items:center;justify-content:center;text-shadow:0 0 8px var(--cc);}
.ms-row{display:flex;flex-direction:column;gap:2px;align-items:center;flex-shrink:0;}
/* M=mute=yellow, S=solo=red */
.ms-btn{width:18px;height:13px;font-family:var(--fh);font-size:11px;font-weight:700;
  background:var(--b1);border:1px solid var(--b2);color:var(--t2);
  border-radius:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  letter-spacing:0;line-height:1;}
.ms-btn.mute-on{background:#ffe04022;border-color:var(--hats);color:var(--hats);}
.ms-btn.solo-on{background:#ff3d5a22;border-color:var(--kick);color:var(--kick);}
.ch-led{width:8px;height:8px;border-radius:50%;background:var(--b1);
  border:1px solid var(--b2);flex-shrink:0;margin-bottom:1px;transition:none;}
.ch-led.lit{background:var(--cc);box-shadow:0 0 8px var(--cc),0 0 16px var(--cc);}
 
/* Volume fader */
.vfdr{display:flex;flex-direction:column;align-items:center;
  width:28px;flex-shrink:0;padding:3px 0 2px;border-right:1px solid var(--b1);gap:1px;}
.vfdr-lbl{font-family:var(--fh);font-size:10px;color:var(--t2);letter-spacing:.5px;}
.vfdr-trk{position:relative;flex:1;width:20px;cursor:ns-resize;touch-action:none;
  display:flex;justify-content:center;}
.vfdr-rail{width:4px;height:100%;background:var(--b2);border-radius:2px;position:absolute;}
.vfdr-cap{position:absolute;left:50%;transform:translateX(-50%);
  width:20px;height:11px;background:var(--s2);border:1px solid var(--b2);
  border-top:2px solid var(--cc);border-radius:2px;cursor:ns-resize;}
.vfdr-val{font-family:var(--fh);font-size:10px;color:var(--cc);text-align:center;}
 
/* Steppers */
.stepper{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:22px;flex-shrink:0;padding:1px;border-right:1px solid var(--b1);gap:1px;}
.stepper-lbl{font-family:var(--fh);font-size:9px;color:var(--t2);letter-spacing:.2px;}
.stepper-btn{width:18px;height:13px;background:var(--b1);border:1px solid var(--b2);
  color:var(--t2);font-size:13px;cursor:pointer;border-radius:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);}
.stepper-num{font-family:var(--fh);font-size:13px;color:var(--cc);line-height:1;}
 
/* Chord wavetable selector */
.wt-sel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:24px;flex-shrink:0;padding:1px;border-right:1px solid var(--b1);gap:1px;}
.wt-lbl{font-family:var(--fh);font-size:9px;color:var(--t2);}
.wt-btn{width:20px;height:11px;background:var(--b1);border:1px solid var(--b2);
  color:var(--t2);font-size:9px;cursor:pointer;border-radius:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);}
.wt-val{font-family:var(--fh);font-size:10px;color:var(--chord);text-align:center;
  width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
 
/* Harmonics selector */
.harm-sel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:24px;flex-shrink:0;padding:1px;border-right:1px solid var(--b1);gap:1px;}
.harm-lbl{font-family:var(--fh);font-size:9px;color:var(--t2);}
.harm-btn{width:20px;height:11px;background:var(--b1);border:1px solid var(--b2);
  color:var(--t2);font-size:9px;cursor:pointer;border-radius:1px;
  display:flex;align-items:center;justify-content:center;font-family:var(--fh);}
.harm-val{font-family:var(--fh);font-size:10px;color:var(--chord);text-align:center;}
 
/* 8 knobs grid */
.knobs{flex:1;display:grid;grid-template-columns:repeat(4,1fr);
  grid-template-rows:repeat(2,1fr);padding:1px;gap:1px;}
.kw{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;min-width:0;}
.klbl{font-family:var(--fh);font-size:10px;color:var(--cc);text-align:center;
  letter-spacing:.3px;line-height:1;overflow:hidden;white-space:nowrap;width:100%;}
.kval-sm{font-family:var(--fh);font-size:9px;color:var(--t2);text-align:center;line-height:1;}
 
/* VU */
.vu{width:5px;background:#060609;position:relative;overflow:hidden;flex-shrink:0;}
.vu-fill{position:absolute;bottom:0;left:0;right:0;height:0%;
  background:linear-gradient(to top,var(--cc),var(--cc) 72%,#ff0 87%,#f22 100%);}
 
/* ── SEQUENCER ───────────────────────────────────────────── */
.seq{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.sbody{flex:1;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;position:relative;}
.srow{display:flex;align-items:stretch;height:var(--RH);border-bottom:1px solid var(--b1);}
.rlbl{flex-shrink:0;font-family:var(--fh);font-size:13px;letter-spacing:1px;
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:4px;border-right:1px solid var(--b1);background:var(--s1);}
.scell{flex-shrink:0;display:flex;flex-direction:column;
  padding:1px;gap:0;border-right:1px solid transparent;position:relative;}
.scell.bb{border-right:1px solid var(--b1);}
.scell.past{opacity:.18;}
.scell.lend>.son{border-right:2px solid var(--cc);}
 
/* ON button */
.son{background:#07070c;border:1px solid var(--b1);cursor:pointer;
  display:flex;align-items:center;justify-content:center;border-radius:2px;}
.son.on{background:var(--cc);border-color:var(--cc);box-shadow:0 0 6px var(--cc);}
.son.cur{outline:2px solid var(--cc);outline-offset:-2px;}
 
/* DEG display — drag/wheel only */
.deg-wrap{display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;touch-action:none;width:100%;background:var(--s2);border:1px solid var(--b1);}
.sdeg{font-family:var(--fh);font-size:11px;color:var(--cc);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;pointer-events:none;}
 
/* ACC button */
.sacc{cursor:pointer;font-family:var(--fh);font-size:9px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--b1);border-radius:1px;width:100%;}
.sacc.on{background:#ff3d5a20;border-color:var(--kick);color:var(--kick);}
 
/* CUT display — drag/wheel only */
.scut-wrap{display:flex;align-items:center;justify-content:center;
  cursor:ns-resize;touch-action:none;width:100%;border:1px solid var(--b1);}
.scut{font-family:var(--fh);font-size:9px;color:var(--t2);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;pointer-events:none;}
 
/* ── POPUP ──────────────────────────────────────────────── */
#popup{position:fixed;background:#111118ee;border:1px solid var(--cc2,#fff);
  border-radius:4px;padding:5px 12px;pointer-events:none;z-index:999;
  font-family:var(--fh);font-size:20px;color:var(--cc2,#fff);
  letter-spacing:2px;display:none;white-space:nowrap;
  box-shadow:0 0 14px var(--cc2,#fff4);}
 
/* ── FOOTER ─────────────────────────────────────────────── */
.ftr{height:var(--FTR);background:var(--s1);border-top:1px solid var(--b1);
  display:flex;align-items:center;padding:0 10px;gap:12px;
  font-family:var(--fh);font-size:12px;letter-spacing:1px;color:var(--t2);flex-shrink:0;}
.fv{color:var(--hats);}
#smsg{margin-left:auto;font-size:11px;color:var(--t2);}

/* ── MIXDOWN DIALOG ────────────────────────────────────── */
.mdl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;
  display:none;align-items:center;justify-content:center;}
.mdl-overlay.open{display:flex;}
.mdl{background:var(--s1);border:1px solid var(--b2);border-radius:6px;
  width:380px;max-width:92vw;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 40px #000a;font-family:var(--fm);}
.mdl-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;border-bottom:1px solid var(--b1);}
.mdl-hdr h2{font-family:var(--fh);font-size:18px;letter-spacing:2px;color:var(--t1);margin:0;}
.mdl-close{background:none;border:none;color:var(--t2);font-size:20px;
  cursor:pointer;padding:0 4px;line-height:1;}
.mdl-close:hover{color:var(--kick);}
.mdl-body{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}
.mdl-row{display:flex;flex-direction:column;gap:3px;}
.mdl-row label{font-family:var(--fh);font-size:11px;color:var(--t2);letter-spacing:1px;}
.mdl-row input,.mdl-row select{background:var(--s2);border:1px solid var(--b2);
  color:var(--t1);font-family:var(--fm);font-size:12px;padding:5px 8px;
  border-radius:2px;outline:none;}
.mdl-row input:focus,.mdl-row select:focus{border-color:var(--chord);}
.mdl-row select{cursor:pointer;}
.mdl-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mdl-footer{display:flex;justify-content:flex-end;gap:8px;padding:10px 14px;
  border-top:1px solid var(--b1);}
.mdl-btn{font-family:var(--fh);font-size:13px;letter-spacing:1px;padding:6px 16px;
  border:1px solid var(--b2);border-radius:2px;cursor:pointer;background:var(--s2);color:var(--t1);}
.mdl-btn:hover{background:var(--b1);}
.mdl-btn.primary{background:#00e5a022;border-color:var(--bass);color:var(--bass);}
.mdl-btn.primary:hover{background:#00e5a033;}
.mdl-info{font-family:var(--fm);font-size:10px;color:var(--t2);padding:2px 0;}

/* ── THEME OVERRIDES ─────────────────────────────────── */
.theme-btn{font-family:var(--fh);font-size:11px;letter-spacing:.5px;padding:0 6px;
  height:22px;line-height:22px;background:var(--s2);border:1px solid var(--b2);
  color:var(--t2);border-radius:2px;cursor:pointer;white-space:nowrap;}
.theme-btn.active{background:#b060ff22;border-color:var(--arp);color:var(--arp);}
body.vintage{background:var(--bg) repeating-linear-gradient(
  87deg,transparent 0px,transparent 4px,rgba(0,0,0,.06) 4px,rgba(0,0,0,.06) 5px) !important;}
body.vintage .hdr,body.vintage .mixer,body.vintage .ch-left,body.vintage .ftr{
  background:var(--s1) repeating-linear-gradient(
  85deg,transparent 0px,transparent 3px,rgba(0,0,0,.04) 3px,rgba(0,0,0,.04) 4px) !important;}
</style>
</head>
<body>
<div id="console">
<!-- HEADER -->
<div class="hdr">
  <div class="brand">GUR-V1</div>
  <button class="hb on"  id="initBtn" onclick="startAudio()">▸ INIT</button>
  <button class="hb"     onclick="newProject()">NEW</button>
  <button class="hb"     onclick="saveProject()">SAVE</button>
  <button class="hb"     onclick="loadBank()">LOAD</button>
  <button class="hb"     id="playBtn" onclick="togglePlay()" disabled>▶ PLAY</button>
  <button class="hb"     id="recBtn"  onclick="toggleRec()">⏺ REC</button>
  <button class="hb"     onclick="doRandom()">⟳ RND</button>
  <div class="scl-grp" id="sclGrp"></div>
  <div class="scl-grp" id="themeGrp"></div>
  <!-- BPM: drag or wheel only -->
  <div class="bgrp" id="bpmDrag">
    <span class="blbl">BPM</span>
    <span class="bval" id="bpmVal">132</span>
  </div>
</div>
 
<!-- TOP ROW -->
<div class="top">
  <div class="top-mx" id="topMx">
    <div id="patBtns" style="display:flex;gap:2px;flex:1;"></div>
  </div>
  <div class="row-spacer" id="rowSpacer"></div>
  <div class="top-sq" id="topSq"></div>
</div>
 
<!-- BODY -->
<div class="body">
  <div class="mixer" id="mixerEl"></div>
  <div class="seq">
    <div class="sbody" id="seqBody">
      <div id="seqRows"></div>
    </div>
  </div>
</div>
 
<!-- FOOTER -->
<div class="ftr">
  <span>STEP</span><span class="fv" id="fStep">--</span>
  <span>BPM</span><span class="fv" id="fBPM">132</span>
  <span id="smsg">tap ▸ INIT to activate</span>
</div>
</div><!-- /console -->

<div id="popup"></div>
<div class="pat-save-hint" id="saveHint">hold 2s to save</div>

<!-- BACKUP RESTORE DIALOG -->
<div class="mdl-overlay" id="backupOverlay">
  <div class="mdl" style="width:340px;">
    <div class="mdl-hdr"><h2>SESSION FOUND</h2></div>
    <div class="mdl-body" style="text-align:center;">
      <div style="font-family:var(--fh);font-size:14px;color:var(--t1);letter-spacing:1px;">
        A backup was saved <span id="backupAge" style="color:var(--hats);"></span>
      </div>
      <div style="font-family:var(--fm);font-size:11px;color:var(--t2);margin-top:4px;">
        Restore previous session or start fresh?
      </div>
    </div>
    <div class="mdl-footer" style="justify-content:center;">
      <button class="mdl-btn" id="backupNew">NEW SESSION</button>
      <button class="mdl-btn primary" id="backupRestore">RESTORE</button>
    </div>
  </div>
</div>

<!-- MIXDOWN DIALOG -->
<div class="mdl-overlay" id="mixdownOverlay">
  <div class="mdl">
    <div class="mdl-hdr"><h2>EXPORT MIXDOWN</h2><button class="mdl-close" onclick="closeMixdown()">&times;</button></div>
    <div class="mdl-body">
      <div class="mdl-row">
        <label>FILENAME</label>
        <input type="text" id="mdFileName" value="GUR-V1_Mix" spellcheck="false">
      </div>
      <div class="mdl-row2">
        <div class="mdl-row">
          <label>FORMAT</label>
          <select id="mdFormat">
            <option value="mp3" selected>MP3</option>
            <option value="wav">WAV</option>
          </select>
        </div>
        <div class="mdl-row">
          <label>QUALITY</label>
          <select id="mdQuality">
            <option value="128">128 kbps</option>
            <option value="192">192 kbps</option>
            <option value="256">256 kbps</option>
            <option value="320" selected>320 kbps</option>
          </select>
        </div>
      </div>
      <div class="mdl-row">
        <label>TITLE</label>
        <input type="text" id="mdTitle" placeholder="Track title">
      </div>
      <div class="mdl-row">
        <label>ARTIST</label>
        <input type="text" id="mdArtist" placeholder="Artist name">
      </div>
      <div class="mdl-row2">
        <div class="mdl-row">
          <label>ALBUM</label>
          <input type="text" id="mdAlbum" placeholder="Album name">
        </div>
        <div class="mdl-row">
          <label>YEAR</label>
          <input type="text" id="mdYear" placeholder="2026">
        </div>
      </div>
      <div class="mdl-row2">

function autoClean(sources,nodes){
  // FIX #5: race-safe cleanup — disconnect after ALL sources end OR fallback timeout
  let remaining=sources.length;
  let cleaned=false;
  function doClean(){
    if(cleaned)return;cleaned=true;
    setTimeout(()=>{nodes.forEach(n=>{try{n.disconnect();}catch(e){}});},80);
  }
  if(remaining===0){doClean();return;}
  sources.forEach(s=>s.addEventListener('ended',()=>{
    remaining--;
    if(remaining<=0)doClean();
  },{once:true}));
  // FIX #5: fallback — if 'ended' never fires, clean up after max note duration
  const maxDur=sources.reduce((mx,s)=>{
    try{const d=s.buffer?s.buffer.duration:10;return Math.max(mx,d);}catch(e){return mx;}
  },10);
  setTimeout(doClean,(maxDur+1)*1000);
}

// FIX #14: safe time guard — ensures envelope scheduling never targets the past

function mkDly(g,nodes){

function mkRvb(g,nodes){

function unlock(){

}

function mkIR(dur,dc){
  const sr=ctx.sampleRate||44100;
  const n=Math.floor(sr*dur),buf=ctx.createBuffer(2,n,sr);
  for(let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/n,dc*8);}
  return buf;
}
function setDT(b){if(dlyNode)dlyNode.delayTime.value=(60/b)*.75;}
 
// Ladder filter — Q=0 when res=0 for smooth closed response
function mkLad(f,r,nodes){
  const qVal=Math.max(0,r)*12; // 0 when res=0
  const s=[];
  for(let i=0;i<4;i++){
    const fl=ctx.createBiquadFilter();fl.type='lowpass';
    fl.frequency.value=Math.min(18000,Math.max(30,f));
    fl.Q.value=i===3?qVal:0; // only last stage gets Q
    s.push(fl);nodes.push(fl);
  }
  for(let i=0;i<3;i++)s[i].connect(s[i+1]);
  return s;
}
function swLad(s,f,r,t,ef,et){
  const dur=Math.max(et-t,.001);
  const qVal=Math.max(0,r)*12;
  s.forEach((x,i)=>{
    const fv=Math.min(18e3,Math.max(30,f));
    const efv=Math.min(18e3,Math.max(30,ef));
    x.frequency.cancelScheduledValues(t);
    x.frequency.setValueAtTime(fv,t);
    if(Math.abs(fv-efv)>.1)x.frequency.exponentialRampToValueAtTime(efv,t+dur);
    // FIX #7: use AudioParam scheduling API for Q to avoid glitches on running nodes
    if(i===3)x.Q.setValueAtTime(qVal,t);
  });
}
function mkTanh(d,nodes){
  const w=ctx.createWaveShaper();w.oversample='2x';
  const n=256,c=new Float32Array(n);
  const dSafe=Math.max(.01,d);
  for(let i=0;i<n;i++){const x=(i*2/n-1)*dSafe;c[i]=Math.tanh(x)/Math.tanh(dSafe);}
  w.curve=c;nodes.push(w);return w;
}
 
function addChorus(source,amount,nodes,stopTime){
  if(amount<=.005)return source;

  const lf1=ctx.createOscillator(),lf2=ctx.createOscillator();
  const lg1=ctx.createGain(),lg2=ctx.createGain();
  lf1.type='sine';lf2.type='sine';
  lf1.frequency.value=.8;lf2.frequency.value=1.1;
  lg1.gain.value=0.005*amount;lg2.gain.value=0.007*amount;
  g1.gain.value=.5;g2.gain.value=.5;
  source.connect(d1);source.connect(d2);source.connect(g1);
  lf1.connect(lg1);lg1.connect(d1.delayTime);
  lf2.connect(lg2);lg2.connect(d2.delayTime);
  d1.connect(g1);d2.connect(g2);
  const now=ctx.currentTime;
  lf1.start(now);lf2.start(now);

  if(stopTime){lf1.stop(stopTime);lf2.stop(stopTime);}

  nodes.push(g1,g2,d1,d2,lf1,lf2,lg1,lg2,out);

}
 
/* ── SYNTHS ─────────────────────────────────────────────── */
function trigKick(t){
  if(!ready||P.kickAmp<=.001)return;
  const nodes=[];
  const sf=Math.max(20,440*Math.pow(2,(P.kickPitch-69)/12));
  const ef=Math.max(20,440*Math.pow(2,((P.kickPitch-25)-69)/12));
  const dur=Math.max(.3,P.kickPunch*.45+.06);
  const bo=ctx.createOscillator();bo.type='sine';
  bo.frequency.setValueAtTime(sf,t);bo.frequency.exponentialRampToValueAtTime(ef,t+.07);
  const be=ctx.createGain();nodes.push(be);
  be.gain.setValueAtTime(0,t);be.gain.linearRampToValueAtTime(1,t+.005);
  be.gain.exponentialRampToValueAtTime(.0001,t+dur);
  // Sub oscillator
  const sub=ctx.createOscillator();sub.type='sine';sub.frequency.value=Math.max(20,sf*.5);
  const subE=ctx.createGain();nodes.push(subE);
  subE.gain.setValueAtTime(0,t);subE.gain.linearRampToValueAtTime(P.kickSub*.5,t+.005);
  subE.gain.exponentialRampToValueAtTime(.0001,t+dur*.8);
  const mo=ctx.createOscillator();mo.type='sine';mo.frequency.value=185;
  const me=ctx.createGain();nodes.push(me);
  me.gain.setValueAtTime(0,t);me.gain.linearRampToValueAtTime(P.kickMid,t+.003);
  me.gain.exponentialRampToValueAtTime(.0001,t+.04);
  const cl=Math.floor(ctx.sampleRate*.01);
  const cb=ctx.createBuffer(1,cl,ctx.sampleRate);
  const cd=cb.getChannelData(0);
  for(let i=0;i<cl;i++)cd[i]=(Math.random()*2-1)*Math.pow(1-i/cl,4);
  const cs=ctx.createBufferSource();cs.buffer=cb;
  const cf=ctx.createBiquadFilter();cf.type='bandpass';cf.frequency.value=5000;cf.Q.value=.4;nodes.push(cf);
  const ce=ctx.createGain();nodes.push(ce);
  // FIX #1: ensure non-zero start for exponential ramp
  ce.gain.setValueAtTime(Math.max(.0001,P.kickClick*.65),t);ce.gain.exponentialRampToValueAtTime(.0001,t+.012);
  const dr=mkTanh(P.kickDrive,nodes);
  // HPF — only applied if kickLoEQ > threshold, avoids filtering sub away
  const hf=ctx.createBiquadFilter();hf.type='highpass';
  hf.frequency.value=Math.max(5,Math.min(60,P.kickLoEQ)); // clamp — don't HPF too high
  nodes.push(hf);
  const og=ctx.createGain();og.gain.value=P.kickAmp*1.1;nodes.push(og);
  bo.connect(be);sub.connect(subE);mo.connect(me);cs.connect(cf);cf.connect(ce);
  be.connect(dr);subE.connect(dr);me.connect(dr);ce.connect(hf);dr.connect(hf);
  hf.connect(og);og.connect(mComp);
  const rv=mkRvb(P.kickReverb,nodes);if(rv)hf.connect(rv);
  bo.start(t);sub.start(t);mo.start(t);cs.start(t);
  bo.stop(t+dur+.05);sub.stop(t+dur+.05);mo.stop(t+dur+.05);
  autoClean([bo,sub,mo,cs],nodes);
}
 
function trigSnare(t){
  if(!ready||P.snareAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.snareDecay);
  const bo=ctx.createOscillator();bo.type='sine';
  bo.frequency.setValueAtTime(Math.max(20,P.snareBody),t);
  bo.frequency.exponentialRampToValueAtTime(Math.max(20,P.snareBody*.68),t+.025);
  const be=ctx.createGain();nodes.push(be);
  // FIX #1: ensure linear ramp target is non-zero so exponential ramp is valid
  be.gain.setValueAtTime(0,t);be.gain.linearRampToValueAtTime(Math.max(.0001,P.snareTone),t+.004);
  be.gain.exponentialRampToValueAtTime(.0001,t+d);
  const nbLen=Math.floor(ctx.sampleRate*(d+.1));
  const nb=ctx.createBuffer(1,nbLen,ctx.sampleRate);
  const nd=nb.getChannelData(0);for(let i=0;i<nbLen;i++)nd[i]=Math.random()*2-1;
  const ns=ctx.createBufferSource();ns.buffer=nb;
  const nf=ctx.createBiquadFilter();nf.type='bandpass';
  nf.frequency.value=Math.max(200,P.snareMidEQ);nf.Q.value=1.2;nodes.push(nf);
  const ne=ctx.createGain();nodes.push(ne);
  ne.gain.setValueAtTime(0,t);ne.gain.linearRampToValueAtTime(Math.max(.0001,P.snareSnap*.72),t+.002);
  ne.gain.exponentialRampToValueAtTime(.0001,t+d*.85);
  ns.connect(nf);nf.connect(ne);
  const dr=mkTanh(P.snareDrive,nodes);
  const og=ctx.createGain();og.gain.value=P.snareAmp;nodes.push(og);
  be.connect(dr);ne.connect(dr);dr.connect(og);og.connect(mComp);
  const rv=mkRvb(P.snareReverb,nodes);if(rv)dr.connect(rv);
  bo.start(t);ns.start(t);bo.stop(t+d+.12);ns.stop(t+d+.12);
  autoClean([bo,ns],nodes);
}
 
// Hats: deg=0→16th(1 hit), deg=1→32nd(2 hits=rolls), deg=2→64th (triplet feel)
// ACC is linked to knob 2 (O.DC) value — when ACC on, use open hat sound
function trigHat(t,subdiv,isAcc){
  if(!ready||P.hatsAmp<=.001)return;
  // subdiv: 0=normal 16th, 1=roll(fire twice), 2=triplet roll(fire 3 times)
  const stepDuration=sDur();
  const offsets=subdiv===1?[0,stepDuration*.5]:
                subdiv===2?[0,stepDuration/3,stepDuration*2/3]:
                [0];
  offsets.forEach(offset=>{
    const tt=t+offset;
    const isOpen=isAcc; // ACC = open hat
    const nodes=[];
    const d=Math.max(.005,isOpen?P.hatDecO:P.hatDecC);
    const bl=Math.floor(ctx.sampleRate*(d+.06));
    const buf=ctx.createBuffer(1,bl,ctx.sampleRate);
    const bd=buf.getChannelData(0);for(let i=0;i<bl;i++)bd[i]=Math.random()*2-1;
    const ns=ctx.createBufferSource();ns.buffer=buf;
    const bp=ctx.createBiquadFilter();bp.type='bandpass';
    bp.frequency.value=Math.max(500,P.hatTone);bp.Q.value=.65;nodes.push(bp);
    // HPF — keep it reasonable
    const hp=ctx.createBiquadFilter();hp.type='highpass';
    hp.frequency.value=Math.max(200,Math.min(12000,P.hatHPF+P.hatHiEQ*3000));nodes.push(hp);
    const cg=ctx.createGain();cg.gain.value=Math.max(1,P.hatCrush);nodes.push(cg);
    const cw=ctx.createWaveShaper();nodes.push(cw);
    const cc2=new Float32Array(256);
    for(let i=0;i<256;i++){const x=i*2/255-1;cc2[i]=Math.max(-1,Math.min(1,x*P.hatCrush))/Math.max(1,P.hatCrush);}
    cw.curve=cc2;
    const en=ctx.createGain();nodes.push(en);
    en.gain.setValueAtTime(0,tt);en.gain.linearRampToValueAtTime(Math.max(.0001,P.hatsAmp*.92),tt+.003);
    en.gain.exponentialRampToValueAtTime(.0001,tt+d);
    // No panning — removed hatPan to avoid mono/stereo issues
    ns.connect(bp);bp.connect(hp);hp.connect(cg);cg.connect(cw);cw.connect(en);en.connect(mComp);
    const rv=mkRvb(isOpen?P.hatVerb*.5:0,nodes);if(rv)en.connect(rv);
    ns.start(tt);ns.stop(tt+d+.08);
    autoClean([ns],nodes);
  });
}
 
function trigBass(t,freq,cs){
  if(!ready||P.bassAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.bassDec);
  const freqSafe=Math.max(18,freq);
  const o1=ctx.createOscillator(),o2=ctx.createOscillator(),o3=ctx.createOscillator();
  // FIX #3: use setValueAtTime before exponentialRamp to avoid scheduling conflicts
  [o1,o2,o3].forEach((o,i)=>{
    o.type='sawtooth';
    if(i===1)o.detune.value=2;if(i===2)o.detune.value=-1.5;
    o.frequency.setValueAtTime(Math.max(18,bsSlide),t);
    o.frequency.exponentialRampToValueAtTime(freqSafe,t+.04);
  });
  bsSlide=freqSafe;
  const mx=ctx.createGain();mx.gain.value=.36;nodes.push(mx);
  const cutB=Math.max(30,P.bassCut+(cs/127)*4000),pk=Math.min(18e3,cutB+P.bassEnv);
  const la=mkLad(pk,P.bassRes,nodes);swLad(la,pk,P.bassRes,t,Math.max(30,cutB),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(1,t+.015);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.08);
  const dr=mkTanh(P.bassDrv*1.4,nodes);
  const og=ctx.createGain();og.gain.value=P.bassAmp*.88;nodes.push(og);
  [o1,o2,o3].forEach(o=>o.connect(mx));mx.connect(dr);dr.connect(la[0]);la[3].connect(ae);ae.connect(og);
  const bStopT=t+d+.25;
  const cho=addChorus(og,P.bassCho,nodes,bStopT);cho.connect(mComp);
  const dg=mkDly(P.bassDly*.7,nodes);if(dg)ae.connect(dg);
  const rg=mkRvb(P.bassVerb*.7,nodes);if(rg)ae.connect(rg);
  [o1,o2,o3].forEach(o=>{o.start(t);o.stop(bStopT);});
  autoClean([o1,o2,o3],nodes);
}
 
// Chord — simplified: CUT+ENV+DEC, auto-routed to reverb(15%)/delay(12%)/chorus(10%)
function trigChord(t,freq,cs){
  if(!ready||P.chordAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.1,P.chordDec);
  const wtName=WAVETABLES[chordWT];
  const isFM=(chordHarm===HARM_FM_IDX);
  const isPWM=(wtName==='PWM');
  const dtune=P.chordDtune||0;       // cents spread, 0=clean
  const harmAmt=P.chordHarmAmt||0;   // 0=dry source only, 1=full harmony/FM mix
  const dlyAmt=P.chordDly||0;        // delay send amount (knob6)
  const fmRatio=P.chordFmFreq||2;    // FM modulator ratio (knob7, only when FM)
  const pwmWidth=isPWM?(P.chordPWM||0.5):0.5; // PWM duty cycle (knob8, only when PWM)
  const freqSafe=Math.max(18,freq);
 
  // ── 3 clean base oscillators, interval spread (no random detune) ──────────
  // Voice 0: root, Voice 1: +7 semitones (5th), Voice 2: +12 semitones (octave)
  // Detune knob spreads them symmetrically: -dtune, 0, +dtune cents
  const intervals=[0,7,12]; // semitone offsets for a clean open voicing
  const detuneSpreads=[-dtune,0,dtune];
 
  const srcOscs=intervals.map((semi,vi)=>{
    const f=freqSafe*Math.pow(2,semi/12);
    const o=ctx.createOscillator();
    o.detune.value=detuneSpreads[vi];
    if(wtName==='SAW')o.type='sawtooth';
    else if(wtName==='SQR')o.type='square';
    else if(wtName==='TRI')o.type='triangle';
    else if(wtName==='SIN')o.type='sine';
    else if(isPWM){
      // PWM: two square waves slightly detuned to simulate pulse-width
      o.type='square';
      o.detune.value=detuneSpreads[vi];
    } else {
      // HARM mode: PeriodicWave for source wave shape (when not FM)
      // Source itself stays the base tone (PURE harmonic = sine-like)
      o.type='sine';
    }
    o.frequency.value=f;
    return o;
  });
 
  // ── PWM second layer (offset square to create width effect) ───────────────
  let pwmOscs=[];
  if(isPWM){
    pwmOscs=intervals.map((semi,vi)=>{
      const f=freqSafe*Math.pow(2,semi/12);
      const o2=ctx.createOscillator();
      o2.type='square';
      // Offset detune to create phase-width illusion
      // FIX #12: clamp PWM detune to +-600 cents to prevent aliasing at extremes
      const pwmDetune=1200*Math.log2(Math.max(0.05,pwmWidth)/(1-Math.min(0.95,pwmWidth)+0.001));
      o2.detune.value=detuneSpreads[vi]+Math.max(-600,Math.min(600,pwmDetune));
      o2.frequency.value=f;
      return o2;
    });
  }
 
  // ── Harmony layer: PeriodicWave additive or FM modulator ─────────────────
  let harmOscs=[];
  let fmMods=[];
  if(harmAmt>0.005){
    if(isFM){
      // FM path: 3 modulators tuned to fmRatio × carrier freq
      harmOscs=intervals.map((semi,vi)=>{
        const carrierF=freqSafe*Math.pow(2,semi/12);
        const modF=Math.max(1,carrierF*fmRatio);
        const mod=ctx.createOscillator();mod.type='sine';
        mod.frequency.value=modF;
        mod.detune.value=detuneSpreads[vi];
        // FM depth scaled by harmAmt — connect to corresponding carrier's frequency
        const modGain=ctx.createGain();
        modGain.gain.value=carrierF*harmAmt*4; // FM index
        nodes.push(modGain);
        mod.connect(modGain);
        // Will connect modGain → srcOscs[vi].frequency below
        fmMods.push({modGain,vi});
        return mod;
      });
    } else {
      // Additive harmony: PeriodicWave applied to 3 additional detuned oscs
      const harmPreset=HARMONIC_PRESETS[chordHarm];
      const pw=buildWave(ctx,chordHarm);
      harmOscs=intervals.map((semi,vi)=>{
        const f=freqSafe*Math.pow(2,semi/12);
        const o=ctx.createOscillator();
        o.setPeriodicWave(pw);
        o.frequency.value=f;
        o.detune.value=detuneSpreads[vi];
        return o;
      });
    }
  }
 
  // ── Mixing ────────────────────────────────────────────────────────────────
  // Source mix (dry)
  const srcMx=ctx.createGain();srcMx.gain.value=(1-harmAmt*0.5)*0.3;nodes.push(srcMx);
  // Harmony/FM mix
  const harmMx=ctx.createGain();harmMx.gain.value=harmAmt*0.3;nodes.push(harmMx);
  // PWM second-layer mix
  const pwmMx=ctx.createGain();pwmMx.gain.value=isPWM?0.2:0;nodes.push(pwmMx);
  // Master pre-filter mix
  const mx=ctx.createGain();mx.gain.value=1;nodes.push(mx);
 
  // Connect FM modulation to carrier frequencies
  fmMods.forEach(({modGain,vi})=>{
    modGain.connect(srcOscs[vi].frequency);
  });
 
  srcOscs.forEach(o=>o.connect(srcMx));
  srcMx.connect(mx);
  if(harmOscs.length){harmOscs.forEach(o=>o.connect(harmMx));harmMx.connect(mx);}
  if(pwmOscs.length){pwmOscs.forEach(o=>o.connect(pwmMx));pwmMx.connect(mx);}
 
  // ── Filter: CUT + ENV sweep, Q=0 (smooth closed) ─────────────────────────
  const cutV=Math.max(30,Math.min(18e3,P.chordCut+(cs/127)*2000));
  const peakCut=Math.min(18e3,cutV+P.chordEnv);
  const la=mkLad(peakCut,0,nodes);
  swLad(la,peakCut,0,t,cutV,t+d*.6);
 
  // ── Amplitude envelope ────────────────────────────────────────────────────
  const en=ctx.createGain();nodes.push(en);
  en.gain.setValueAtTime(0,t);en.gain.linearRampToValueAtTime(P.chordAmp,t+.02);
  en.gain.exponentialRampToValueAtTime(.0001,t+d);
 
  // ── Slight saturation ────────────────────────────────────────────────────
  const dr=ctx.createWaveShaper();nodes.push(dr);
  {const n=256,c=new Float32Array(n);for(let i=0;i<n;i++){const x=(i*2/n-1)*1.2;c[i]=Math.tanh(x)/Math.tanh(1.2);}dr.curve=c;}
 
  mx.connect(dr);dr.connect(la[0]);la[3].connect(en);
 
  // ── FX routing ──────────────────────────────────────────────────────────
  // Chorus and reverb: fixed low amounts
  const stopT=t+d+.4;
  const cho=addChorus(en,0.10,nodes,stopT);cho.connect(mComp);
  const rg=mkRvb(P.chordVerb,nodes);if(rg)en.connect(rg);
  // Delay: only if knob6 > 0
  const dg=mkDly(dlyAmt,nodes);if(dg)en.connect(dg);
 
  // ── Start / stop all oscillators ─────────────────────────────────────────
  // Start each group
  srcOscs.forEach(o=>{o.start(t);o.stop(stopT);});
  harmOscs.forEach(o=>{o.start(t);o.stop(stopT);});
  pwmOscs.forEach(o=>{o.start(t);o.stop(stopT);});
  autoClean([...srcOscs,...harmOscs,...pwmOscs],nodes);
}
 
function trigArp(t,freq,cs){
  if(!ready||P.arpAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.arpDec);
  const freqSafe=Math.max(18,freq);
  const oc=ctx.createOscillator(),op=ctx.createOscillator();
  oc.type='sawtooth';op.type='square';oc.frequency.value=freqSafe;op.frequency.value=freqSafe;
  const sg=ctx.createGain(),pg=ctx.createGain(),mx=ctx.createGain();
  sg.gain.value=.7;pg.gain.value=.3;mx.gain.value=1;nodes.push(sg,pg,mx);
  const pk=Math.min(18e3,Math.max(30,P.arpCut+(cs/127)*5000+P.arpEnv));
  const la=mkLad(pk,P.arpRes,nodes);swLad(la,pk,P.arpRes,t,Math.max(30,P.arpCut),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(P.arpAmp*.82,t+.003);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.03);
  const dr=mkTanh(P.arpDrv*1.5,nodes);
  oc.connect(sg);op.connect(pg);sg.connect(mx);pg.connect(mx);mx.connect(dr);dr.connect(la[0]);la[3].connect(ae);
  const aStopT=t+d+.08;
  const cho=addChorus(ae,P.arpCho,nodes,aStopT);cho.connect(mComp);
  const dg=mkDly(P.arpDly,nodes);if(dg)ae.connect(dg);
  const rg=mkRvb(P.arpVerb*.6,nodes);if(rg)ae.connect(rg);
  oc.start(t);op.start(t);oc.stop(aStopT);op.stop(aStopT);
  autoClean([oc,op],nodes);
}
 
function trigPad(t,freq,cs){
  if(!ready||P.padAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.1,P.padDec),atk=P.padAtk;
  const freqSafe=Math.max(18,freq);
  const fs=[.994,1.006,1.005*.997,1.005*1.003,2.003*.998,2.003*1.002];
  const os=fs.map(f=>{const o=ctx.createOscillator();o.type='sawtooth';o.frequency.value=freqSafe*f;return o;});
  const mx=ctx.createGain();mx.gain.value=.18;nodes.push(mx);
  const cutV=Math.min(18e3,Math.max(30,P.padCut+(cs/127)*4000));
  const fi=ctx.createBiquadFilter();fi.type='lowpass';fi.frequency.value=cutV;
  fi.Q.setValueAtTime(Math.max(0,P.padRes)*8,t);nodes.push(fi);
  const lf=ctx.createOscillator();lf.type='sine';lf.frequency.value=Math.max(.01,P.padLFO);
  const lg=ctx.createGain();lg.gain.value=200;nodes.push(lg);
  lf.connect(lg);lg.connect(fi.frequency);
  const en=ctx.createGain();nodes.push(en);
  en.gain.setValueAtTime(0,t);en.gain.linearRampToValueAtTime(Math.max(.0001,P.padAmp*.78),t+atk);
  en.gain.exponentialRampToValueAtTime(.0001,t+atk+d+.5);
  os.forEach(o=>o.connect(mx));mx.connect(fi);fi.connect(en);
  const stopT=t+atk+d+1.0;
  const cho=addChorus(en,P.padCho,nodes,stopT);cho.connect(mComp);
  const dg=mkDly(P.padDly*.8,nodes);if(dg)en.connect(dg);
  const rg=mkRvb(P.padVerb*.7,nodes);if(rg)en.connect(rg);
  os.forEach(o=>{o.start(t);o.stop(stopT);});lf.start(t);lf.stop(stopT);
  autoClean([...os,lf],nodes);
}
 
function trigLead(t,freq,cs,acc){
  if(!ready||P.leadAmp<=.001)return;
  const nodes=[];
  const d=Math.max(.04,P.leadDec);
  const freqSafe=Math.max(18,freq);
  const o1=ctx.createOscillator(),o2=ctx.createOscillator();
  // FIX #3: use setValueAtTime before exponentialRamp for lead portamento
  o1.type='sawtooth';o2.type='sawtooth';o2.detune.value=3;
  [o1,o2].forEach(o=>{
    o.frequency.setValueAtTime(Math.max(18,ldSlide),t);
    o.frequency.exponentialRampToValueAtTime(freqSafe,t+.04);
  });
  ldSlide=freqSafe;
  const mx=ctx.createGain();mx.gain.value=.55;nodes.push(mx);
  const pk=Math.min(18e3,Math.max(30,P.leadCut+(cs/127)*5000+P.leadEnv+(acc?P.leadEnv*.5:0)));
  const la=mkLad(pk,P.leadRes,nodes);swLad(la,pk,P.leadRes,t,Math.max(30,P.leadCut),t+d);
  const ae=ctx.createGain();nodes.push(ae);
  ae.gain.setValueAtTime(0,t);ae.gain.linearRampToValueAtTime(P.leadAmp*(acc?1.4:1),t+.005);
  ae.gain.exponentialRampToValueAtTime(.0001,t+d+.06);
  const dr=mkTanh(P.leadDrv*2.2,nodes);
  const og=ctx.createGain();og.gain.value=1;nodes.push(og);
  [o1,o2].forEach(o=>o.connect(mx));mx.connect(dr);dr.connect(la[0]);la[3].connect(ae);ae.connect(og);
  const lStopT=t+d+.15;
  const cho=addChorus(og,P.leadCho,nodes,lStopT);cho.connect(mComp);
  const dg=mkDly(P.leadDly,nodes);if(dg)ae.connect(dg);
  const rg=mkRvb(P.leadVerb*.6,nodes);if(rg)ae.connect(rg);
  [o1,o2].forEach(o=>{o.start(t);o.stop(lStopT);});
  autoClean([o1,o2],nodes);
}
 
/* ═══════════════════════════════════════════════════════════
   SCHEDULER
═══════════════════════════════════════════════════════════ */
let bpm=132,nst=0,schedTimer=null;
function sDur(){return(60/bpm)/4;}
 
function fireNote(ci,s,t){
  const anySolo=soloState.some(Boolean);
  if(anySolo&&!soloState[ci])return;
  if(!anySolo&&muteState[ci])return;
  if(!seqState.on[ci][s])return;
  const deg=seqState.deg[ci][s],acc=seqState.acc[ci][s],cut=seqState.cut[ci][s];
  if(ci===0)trigKick(t);
  else if(ci===1)trigSnare(t);
  else if(ci===2)trigHat(t,deg,acc); // deg=subdiv, acc=open/closed
  else if(ci===3)trigBass(t,d2f(deg,'bassOct'),cut);
  else if(ci===4)trigChord(t,d2f(deg,'chordOct'),cut);
  else if(ci===5)trigArp(t,d2f(deg,'arpOct'),cut);
  else if(ci===6)trigPad(t,d2f(deg,'padOct'),cut);
  else if(ci===7)trigLead(t,d2f(deg,'leadOct'),cut,acc);
  const ms=Math.max(0,(t-ctx.currentTime)*1000);
  const led=ledEls[ci];
  if(led)setTimeout(()=>{led.classList.add('lit');setTimeout(()=>led.classList.remove('lit'),90);},ms);
  const row=stepCells[ci];
  if(row){
    setTimeout(()=>{
      if(row._p!=null&&row[row._p])row[row._p].son.classList.remove('cur');
      if(row[s]){row[s].son.classList.add('cur');row._p=s;}
    },ms);
  }
}
 
function scheduler(){
  if(!playing||!ctx)return;
  if(ctx.state==='suspended')ctx.resume();
  while(nst<ctx.currentTime+.12){
    for(let ci=0;ci<8;ci++){
      const s=chStep[ci]%chLen[ci];
      fireNote(ci,s,nst);
    }
    for(let ci=0;ci<8;ci++)chStep[ci]++;
    const s0=(chStep[0]-1)%chLen[0],t2=nst;
    setTimeout(()=>{if(playing)document.getElementById('fStep').textContent=s0+1;},
      Math.max(0,(t2-ctx.currentTime)*1000));
    nst+=sDur();
  }
  schedTimer=setTimeout(scheduler,25);
}
 
function startSeq(){
  for(let ci=0;ci<8;ci++)chStep[ci]=0;
  nst=ctx.currentTime+.05;
  if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
  schedTimer=setTimeout(scheduler,0);
}
function stopSeq(){
  if(schedTimer){clearTimeout(schedTimer);schedTimer=null;}
  // FIX #2: reset portamento slides so first note after stop doesn't sweep from stale freq
  bsSlide=55;ldSlide=110;
  document.getElementById('fStep').textContent='--';
  stepCells.forEach(row=>{
    if(!row)return;
    for(let k in row){if(row[k]&&row[k].son)row[k].son.classList.remove('cur');}
    row._p=null;
  });
  CH.forEach((_,ci)=>{const l=ledEls[ci];if(l)l.classList.remove('lit');});
}
 
let vuRaf=null;
function startVU(){
  if(vuRaf)return;
  function p(){
    if(!playing){CH.forEach((_,ci)=>setVU(ci,0));vuRaf=null;return;}
    CH.forEach((_,ci)=>{
      const s=Math.max(0,chStep[ci]-1)%chLen[ci];
      const on=seqState.on[ci][s],vol=P[PD[CH[ci].id][0][1]]||0;
      setVU(ci,on?vol*(.5+Math.random()*.5):Math.random()*.02);
    });
    vuRaf=requestAnimationFrame(p);
  }
  vuRaf=requestAnimationFrame(p);
}
function stopVU(){
  if(vuRaf){cancelAnimationFrame(vuRaf);vuRaf=null;}
  CH.forEach((_,ci)=>setVU(ci,0));
}
function setVU(ci,lv){const el=vuEls[ci];if(el)el.style.height=Math.min(100,lv*260)+'%';}
 
/* ═══════════════════════════════════════════════════════════
   RECORDING & MIXDOWN EXPORT
═══════════════════════════════════════════════════════════ */
function toggleRec(){
  startAudio().then(()=>{
    if(!ready)return;
    const btn=document.getElementById('recBtn');
    if(!isRecording){
      recLeft=[];recRight=[];isRecording=true;
      btn.textContent='■ REC';btn.classList.add('rec-active');setMsg('RECORDING...');
    }else{
      isRecording=false;btn.textContent='⏺ REC';btn.classList.remove('rec-active');
      openMixdownDialog();
    }
  });
}

function openMixdownDialog(){
  let totalSamples=0;for(let i=0;i<recLeft.length;i++)totalSamples+=recLeft[i].length;
  const dur=totalSamples/(ctx.sampleRate||44100);
  const mins=Math.floor(dur/60),secs=Math.floor(dur%60);
  document.getElementById('mdInfo').textContent=
    'Duration: '+mins+'m '+secs+'s · '+Math.round(ctx.sampleRate)+'Hz stereo';
  document.getElementById('mdFileName').value='GUR-V1_Mix_'+new Date().toISOString().slice(0,10);
  document.getElementById('mdYear').value=new Date().getFullYear();
  updateQualityVis();
  document.getElementById('mixdownOverlay').classList.add('open');
  setMsg('CONFIGURE EXPORT');
}
function closeMixdown(){
  document.getElementById('mixdownOverlay').classList.remove('open');
  if(recLeft.length>0)setMsg('EXPORT CANCELLED — audio kept, tap REC to discard');
}
function updateQualityVis(){
  const fmt=document.getElementById('mdFormat').value;

// FIX #8b: flatten chunked recording buffers into single Float32Arrays
function flattenChunks(chunks){
  let total=0;
  for(let i=0;i<chunks.length;i++)total+=chunks[i].length;
  const out=new Float32Array(total);
  let off=0;
  for(let i=0;i<chunks.length;i++){out.set(chunks[i],off);off+=chunks[i].length;}
  return out;
}

/* ── WAV export with ID3-like metadata in LIST/INFO chunk ── */
function exportWAV(name,tags){
  const sr=ctx.sampleRate||44100;
  const flatL=flattenChunks(recLeft),flatR=flattenChunks(recRight);
  const nSamples=flatL.length;
  const bps=16, nCh=2;
  const blockAlign=nCh*(bps/8);
  const dataSize=nSamples*blockAlign;

  // Build LIST INFO chunk for metadata
  const infoEntries=[];
  if(tags.title)  infoEntries.push(['INAM',tags.title]);
  if(tags.artist) infoEntries.push(['IART',tags.artist]);
  if(tags.album)  infoEntries.push(['IPRD',tags.album]);
  if(tags.year)   infoEntries.push(['ICRD',tags.year]);
  if(tags.genre)  infoEntries.push(['IGNR',tags.genre]);
  if(tags.track)  infoEntries.push(['ITRK',tags.track]);
  if(tags.comment)infoEntries.push(['ICMT',tags.comment]);
  infoEntries.push(['ISFT','GUR-V1 Deep Techno Machine']);

  let infoPayloadSize=4; // 'INFO'
  const encodedEntries=infoEntries.map(([id,val])=>{
    const enc=new TextEncoder().encode(val+'\0');
    const padded=enc.length%2!==0?new Uint8Array([...enc,0]):enc;
    infoPayloadSize+=8+padded.length; // 4(id)+4(size)+data
    return{id,data:padded,rawLen:enc.length};
  });
  const hasInfo=infoEntries.length>0;
  const listChunkSize=hasInfo?8+infoPayloadSize:0; // 'LIST'+size+payload

  const fileSize=36+dataSize+(hasInfo?listChunkSize:0);
  const buf=new ArrayBuffer(8+fileSize);
  const v=new DataView(buf);
  let o=0;
  function ws(s){for(let i=0;i<s.length;i++)v.setUint8(o++,s.charCodeAt(i));}
  function w32(n){v.setUint32(o,n,true);o+=4;}
  function w16(n){v.setUint16(o,n,true);o+=2;}

  ws('RIFF');w32(fileSize);ws('WAVE');
  ws('fmt ');w32(16);w16(1);w16(nCh);w32(sr);w32(sr*blockAlign);w16(blockAlign);w16(bps);
  ws('data');w32(dataSize);

  for(let i=0;i<nSamples;i++){
    const l=Math.max(-1,Math.min(1,flatL[i])),r=Math.max(-1,Math.min(1,flatR[i]));
    w16(l<0?l*0x8000:l*0x7FFF);
    w16(r<0?r*0x8000:r*0x7FFF);
  }

  // LIST INFO chunk
  if(hasInfo){
    ws('LIST');w32(infoPayloadSize);ws('INFO');
    encodedEntries.forEach(({id,data,rawLen})=>{
      ws(id);w32(rawLen);
      const arr=new Uint8Array(buf,o,data.length);
      arr.set(data);o+=data.length;
    });
  }

  const blob=new Blob([buf],{type:'audio/wav'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'.wav';a.click();URL.revokeObjectURL(a.href);
  setMsg('WAV EXPORTED');
  recLeft=[];recRight=[];
}

/* ── MP3 export with ID3v2 tags ── */
function exportMP3(name,kbps,tags){
  const flatL=flattenChunks(recLeft),flatR=flattenChunks(recRight);
  const mp3enc=new lamejs.Mp3Encoder(2,ctx.sampleRate,kbps);
  const mp3Data=[];const bs=1152;
  for(let i=0;i<flatL.length;i+=bs){
    const end=Math.min(i+bs,flatL.length);
    const lc=new Int16Array(end-i),rc=new Int16Array(end-i);
    for(let j=i;j<end;j++){lc[j-i]=Math.round(flatL[j]<0?flatL[j]*32768:flatL[j]*32767);rc[j-i]=Math.round(flatR[j]<0?flatR[j]*32768:flatR[j]*32767);}
    const enc=mp3enc.encodeBuffer(lc,rc);if(enc.length>0)mp3Data.push(new Int8Array(enc));
  }
  const fl=mp3enc.flush();if(fl.length>0)mp3Data.push(new Int8Array(fl));

  // Build ID3v2.3 header
  const id3=buildID3v2(tags);
  const finalParts=[id3,...mp3Data];
  const blob=new Blob(finalParts,{type:'audio/mpeg'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'.mp3';a.click();URL.revokeObjectURL(a.href);
  setMsg('MP3 EXPORTED ('+kbps+'kbps)');
  recLeft=[];recRight=[];
}

/* ── ID3v2.3 tag builder ── */
function buildID3v2(tags){
  const frames=[];
  function addText(id,text){
    if(!text)return;
    const enc=new TextEncoder().encode(text);
    // frame: 4-byte ID, 4-byte size, 2-byte flags, 1-byte encoding(0=ISO), then string
    const size=1+enc.length;
    const frame=new Uint8Array(10+size);
    for(let i=0;i<4;i++)frame[i]=id.charCodeAt(i);
    frame[4]=(size>>24)&0xff;frame[5]=(size>>16)&0xff;
    frame[6]=(size>>8)&0xff;frame[7]=size&0xff;
    frame[8]=0;frame[9]=0; // flags
    frame[10]=0; // encoding: ISO-8859-1
    frame.set(enc,11);
    frames.push(frame);
  }
  addText('TIT2',tags.title);
  addText('TPE1',tags.artist);
  addText('TALB',tags.album);
  addText('TDRC',tags.year);     // recording year
  addText('TYER',tags.year);     // ID3v2.3 year
  addText('TCON',tags.genre);
  addText('TRCK',tags.track);
  addText('COMM',tags.comment);
  addText('TSSE','GUR-V1 Deep Techno Machine');

  let totalFrameSize=0;
  frames.forEach(f=>totalFrameSize+=f.length);

  // ID3v2 header: 10 bytes
  // "ID3" + version(2,3) + flags(0) + syncsafe size
  const header=new Uint8Array(10);
  header[0]=0x49;header[1]=0x44;header[2]=0x33; // "ID3"
  header[3]=3;header[4]=0; // v2.3
  header[5]=0; // flags
  // Syncsafe integer encoding for size
  const sz=totalFrameSize;
  header[6]=(sz>>21)&0x7f;header[7]=(sz>>14)&0x7f;
  header[8]=(sz>>7)&0x7f;header[9]=sz&0x7f;

  const result=new Uint8Array(10+totalFrameSize);
  result.set(header,0);
  let off=10;
  frames.forEach(f=>{result.set(f,off);off+=f.length;});
  return result;
}

/* ═══════════════════════════════════════════════════════════
   CANVAS KNOB — 3D rendered, theme-aware, pointer capture
═══════════════════════════════════════════════════════════ */
const KS=0.75*Math.PI,KE=2.25*Math.PI,KR=KE-KS;
function makeKnob(parent,lbl,key,mn,mx2,df,ci,sz){
  const wrap=document.createElement('div');wrap.className='kw';
  const lb=document.createElement('div');lb.className='klbl';lb.textContent=lbl;
  lb.style.fontSize=Math.max(8,sz*.34)+'px';
  const dpr=window.devicePixelRatio||1;
  const cv=document.createElement('canvas');
  cv.width=Math.round(sz*dpr);cv.height=Math.round(sz*dpr);
  cv.style.cssText=`width:${sz}px;height:${sz}px;touch-action:none;cursor:ns-resize;display:block;`;
  const vl=document.createElement('div');vl.className='kval-sm';
  wrap.appendChild(lb);wrap.appendChild(cv);wrap.appendChild(vl);
  parent.appendChild(wrap);
  let norm=(df-mn)/(mx2-mn);

  function draw(){
    const col=CH[ci].c;
    const th=THEMES[currentTheme].knob;
    const s=cv.width,cx=s/2,cy=s/2,r=s/2-3*dpr;
    const c=cv.getContext('2d');c.clearRect(0,0,s,s);
    c.save();
    const ang=KS+norm*KR;
    const lw=Math.max(2,3*dpr);

    // Shadow beneath knob
    c.beginPath();c.arc(cx,cy+1.5*dpr,r*.82,0,Math.PI*2);
    c.fillStyle=th.shadow;c.fill();

    // Outer bezel ring
    c.beginPath();c.arc(cx,cy,r*.88,0,Math.PI*2);
    const bz=c.createLinearGradient(cx-r,cy-r,cx+r,cy+r);
    bz.addColorStop(0,th.bezel[0]);bz.addColorStop(.5,th.bezel[1]);bz.addColorStop(1,th.bezel[2]);
    c.fillStyle=bz;c.fill();

    // Knob body — 3D dome
    c.beginPath();c.arc(cx,cy,r*.72,0,Math.PI*2);
    const bg=c.createRadialGradient(cx-r*.12,cy-r*.18,r*.04,cx,cy,r*.72);
    bg.addColorStop(0,th.body[0]);bg.addColorStop(.55,th.body[1]);bg.addColorStop(1,th.body[2]);
    c.fillStyle=bg;c.fill();

    // Brushed metal texture for vintage
    if(th.metal){
      c.save();c.globalAlpha=.12;
      c.beginPath();c.arc(cx,cy,r*.70,0,Math.PI*2);c.clip();
      for(let a=0;a<Math.PI*2;a+=.18){
        c.beginPath();c.moveTo(cx,cy);
        c.lineTo(cx+r*.72*Math.cos(a),cy+r*.72*Math.sin(a));
        c.strokeStyle='#fff';c.lineWidth=.5*dpr;c.stroke();
      }
      c.restore();
    }

    // Arc track (background)
    c.beginPath();c.arc(cx,cy,r,KS,KE);
    c.strokeStyle=th.track;c.lineWidth=lw;c.lineCap='round';c.stroke();

    // Active arc (colored)
    if(norm>.001){
      c.beginPath();c.arc(cx,cy,r,KS,ang);
      c.strokeStyle=col;c.lineWidth=lw;c.lineCap='round';c.stroke();
    }

    // Indicator line (offset from center)
    const indStart=r*.32,indEnd=r*.68;
    c.beginPath();
    c.moveTo(cx+indStart*Math.cos(ang),cy+indStart*Math.sin(ang));
    c.lineTo(cx+indEnd*Math.cos(ang),cy+indEnd*Math.sin(ang));
    c.strokeStyle=col;c.lineWidth=Math.max(1.5,2*dpr);c.lineCap='round';c.stroke();

    // Glow dot at indicator tip
    if(th.glow){
      c.shadowColor=col;c.shadowBlur=6*dpr;
    }
    c.beginPath();
    c.arc(cx+indEnd*Math.cos(ang),cy+indEnd*Math.sin(ang),2*dpr,0,Math.PI*2);
    c.fillStyle=col;c.fill();
    c.shadowBlur=0;

    c.restore();
    lb.style.color=col;
  }

  function fmt(v){return v<10?v.toFixed(2):v<1000?Math.round(v):(v/1000).toFixed(1)+'k';}
  function setV(n,fromDrag){
    norm=Math.max(0,Math.min(1,n));
    const rv=mn+norm*(mx2-mn);P[key]=rv;
    vl.textContent=fmt(rv);draw();
    if(fromDrag)showPop(lbl,fmt(rv),CH[ci].c,cv);
  }
  setV(norm);

  uiRefresh.push(()=>{
    const rv=P[key]||df;
    norm=Math.max(0,Math.min(1,(rv-mn)/(mx2-mn)));
    vl.textContent=fmt(rv);draw();
  });

  let active=false,startY=0,startN=0;
  cv.addEventListener('pointerdown',e=>{active=true;startY=e.clientY;startN=norm;cv.setPointerCapture(e.pointerId);e.preventDefault();});
  cv.addEventListener('pointermove',e=>{if(active)setV(startN-(e.clientY-startY)/90,true);});
  cv.addEventListener('pointerup',()=>{active=false;});
  cv.addEventListener('pointercancel',()=>{active=false;});
  cv.addEventListener('wheel',e=>{e.preventDefault();setV(norm-(e.deltaY>0?.02:-.02),true);},{passive:false});
  cv.addEventListener('dblclick',()=>setV((df-mn)/(mx2-mn)));
  return{setV,draw};
}

      const hsl=document.createElement('div');hsl.className='harm-lbl';hsl.textContent='HARM';
      const hsu=document.createElement('div');hsu.className='harm-btn';hsu.textContent='▲';
      const hsv=document.createElement('div');hsv.className='harm-val';hsv.textContent=HARMONIC_PRESETS[chordHarm].name;
      const hsd=document.createElement('div');hsd.className='harm-btn';hsd.textContent='▼';
      hs.appendChild(hsl);hs.appendChild(hsu);hs.appendChild(hsv);hs.appendChild(hsd);div.appendChild(hs);
 
      // Build knob grid: CUT(1) ENV(2) DEC(3) DTUNE(4) HARM(5) DLY(6) FM-F(7) PWM(8)
      const kg=document.createElement('div');kg.className='knobs';div.appendChild(kg);
 
      // Create all 8 knob wrappers — we need refs to show/hide k7 and k8
      const kWrappers=[]; // index 0=knob1 .. 7=knob8
      for(let pi=1;pi<=8;pi++){
        const[l,k,mn,mx2,df]=PD[ch.id][pi];
        const kref=makeKnob(kg,l,k,mn,mx2,df,ci,kSz);
        kWrappers.push({pi,wrapper:kref,lbl:l,el:kg.children[pi-1]});
      }
 
      // Helper: dim/enable knob 7 (FM-F) and knob 8 (PWM) based on current mode
      function updateChordKnobVis(){
        const isFMnow=(chordHarm===HARM_FM_IDX);
        const isPWMnow=(WAVETABLES[chordWT]==='PWM');
        const k7el=kg.children[6]; // FM-F (0-indexed)
        const k8el=kg.children[7]; // PWM  (0-indexed)
        if(k7el){
          k7el.style.opacity=isFMnow?'1':'0.22';
          k7el.style.pointerEvents=isFMnow?'auto':'none';
        }
        if(k8el){
          k8el.style.opacity=isPWMnow?'1':'0.22';
          k8el.style.pointerEvents=isPWMnow?'auto':'none';
        }
      }
 
      function cycleWT(d){chordWT=(chordWT+d+WAVETABLES.length)%WAVETABLES.length;wtv.textContent=WAVETABLES[chordWT];updateChordKnobVis();}
      wtu.addEventListener('click',()=>cycleWT(1));wtd.addEventListener('click',()=>cycleWT(-1));
      wtu.addEventListener('touchend',e=>{cycleWT(1);e.preventDefault();});
      wtd.addEventListener('touchend',e=>{cycleWT(-1);e.preventDefault();});
 
      function cycleH(d){chordHarm=(chordHarm+d+HARMONIC_PRESETS.length)%HARMONIC_PRESETS.length;hsv.textContent=HARMONIC_PRESETS[chordHarm].name;updateChordKnobVis();}
      hsu.addEventListener('click',()=>cycleH(1));hsd.addEventListener('click',()=>cycleH(-1));
      hsu.addEventListener('touchend',e=>{cycleH(1);e.preventDefault();});
      hsd.addEventListener('touchend',e=>{cycleH(-1);e.preventDefault();});
 
      // Apply initial visibility
      updateChordKnobVis();

      uiRefresh.push(() => {
        wtv.textContent = WAVETABLES[chordWT];
        hsv.textContent = HARMONIC_PRESETS[chordHarm].name;
        updateChordKnobVis();
      });
 
      // VU
      const vu=document.createElement('div');vu.className='vu';
      const vuf=document.createElement('div');vuf.className='vu-fill';
      vu.appendChild(vuf);div.appendChild(vu);vuEls[ci]=vuf;
 
      wrap.appendChild(div);
      return; // skip the generic knob+VU block below
    }
 
    // Knobs for all non-chord channels
    const kg=document.createElement('div');kg.className='knobs';div.appendChild(kg);
    for(let pi=1;pi<=8;pi++){
      const[l,k,mn,mx2,df]=PD[ch.id][pi];
      makeKnob(kg,l,k,mn,mx2,df,ci,kSz);
    }
 
    // VU
    const vu=document.createElement('div');vu.className='vu';
    const vuf=document.createElement('div');vuf.className='vu-fill';
    vu.appendChild(vuf);div.appendChild(vu);vuEls[ci]=vuf;
 
    wrap.appendChild(div);
  });
}

   THEME SWITCHING
═══════════════════════════════════════════════════════════ */
function buildThemeSelector(){
  const grp=document.getElementById('themeGrp');
  Object.entries(THEMES).forEach(([key,theme])=>{
    const btn=document.createElement('div');
    btn.className='theme-btn'+(key===currentTheme?' active':'');
    btn.dataset.theme=key;btn.textContent=theme.name;
    btn.addEventListener('click',()=>setTheme(key));
    grp.appendChild(btn);
  });
}

function setTheme(name){
  currentTheme=name;
  const theme=THEMES[name];
  const root=document.documentElement;
  // Apply CSS custom properties
  Object.entries(theme.css).forEach(([prop,val])=>{
    root.style.setProperty(prop,val);
  });
  // Update CH colors to match theme
  CH.forEach(ch=>{ch.c=theme.css['--'+ch.id];});
  // Body class for theme-specific CSS
  document.body.className=name==='vintage'?'vintage':'';
  // Update channel strip --cc colors
  chDivEls.forEach((el,ci)=>{if(el)el.style.setProperty('--cc',CH[ci].c);});
  // Redraw all knobs + UI
  uiRefresh.forEach(fn=>fn());
  // Update theme buttons
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.theme===name);
  });
  // Rebuild seq to pick up new colors
  buildSeqRows();
}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE SCALING
═══════════════════════════════════════════════════════════ */
let DESIGN_W=0,DESIGN_H=0;
function initScale(){
  DESIGN_W=window.innerWidth;
  DESIGN_H=window.innerHeight;
}
function updateScale(){
  if(!DESIGN_W)return;
  const scaleX=window.innerWidth/DESIGN_W;
  const scaleY=window.innerHeight/DESIGN_H;
  const scale=Math.min(scaleX,scaleY);
  const con=document.getElementById('console');
  if(!con)return;
  con.style.transform=`scale(${scale})`;
  con.style.transformOrigin='top left';
  con.style.width=DESIGN_W+'px';
  con.style.height=DESIGN_H+'px';
}

/* ═══════════════════════════════════════════════════════════
   BUILD SEQUENCER
═══════════════════════════════════════════════════════════ */
function calcDims(){
  LW=Math.max(26,Math.min(38,Math.floor(window.innerWidth*0.3333*.2)));
  const avail=Math.floor(window.innerWidth*0.6667)-LW;
  CW=Math.max(16,Math.floor(avail/seqLen));
  document.getElementById('rowSpacer').style.width=LW+'px';
}
 
function buildTopNums(){
  const sq=document.getElementById('topSq');sq.innerHTML='';snumEls=[];
  for(let i=0;i<seqLen;i++){
    const el=document.createElement('div');el.className='snum'+(i%4===0?' b4':'');
    el.textContent=i+1;el.style.width=CW+'px';el.style.height='100%';
    sq.appendChild(el);snumEls.push(el);
  }
}
 
function buildSeqRows(){
  sonToCell.clear();
  const wrap=document.getElementById('seqRows');wrap.innerHTML='';
  const prevP=stepCells.map(r=>r?r._p:null);
  stepCells=[];
  const chH=Math.floor((window.innerHeight-40-30-22)/8);
  const sz=SCALES[scaleKey].size;
 
  // Fixed proportions — identical for every channel including hats
  // ON=44% DEG=26% ACC=18% CUT=12%  (sum=100%)
  const onH =Math.max(14,Math.floor(chH*.44));
  const degH=Math.max(10,Math.floor(chH*.26));
  const accH=Math.max(8, Math.floor(chH*.18));
  const cutH=Math.max(7, chH-onH-degH-accH); // remainder fills exactly
 
  CH.forEach((ch,ci)=>{
    stepCells[ci]=[];stepCells[ci]._p=prevP[ci]??null;
    const row=document.createElement('div');row.className='srow';row.style.height=chH+'px';
    const rl=document.createElement('div');rl.className='rlbl';
    rl.style.cssText=`width:${LW}px;color:${ch.c};font-size:${Math.max(10,LW/3.2)}px;`;
    rl.textContent=ch.n.substring(0,4);row.appendChild(rl);
 
    for(let s=0;s<seqLen;s++){
      const past=s>=chLen[ci],lend=s===chLen[ci]-1;
      const cell=document.createElement('div');
      cell.className='scell'+(s%4===3?' bb':'')+(past?' past':'')+(lend?' lend':'');
      cell.style.cssText=`width:${CW}px;height:${chH}px;--cc:${ch.c};`;
 
      // ── ON button ──────────────────────────────────────────
      const son=document.createElement('div');
      son.className='son'+(seqState.on[ci][s]?' on':'');
      son.style.cssText=`height:${onH}px;min-height:${onH}px;width:100%;flex-shrink:0;--cc:${ch.c};`;
      sonToCell.set(son,{ci,s});
 
      son.addEventListener('pointerdown',e=>{
        if(e.button!==0)return;
        e.preventDefault();
        paintVal=seqState.on[ci][s]?0:1;
        paintActive=true;
        seqState.on[ci][s]=paintVal;
        son.classList.toggle('on',paintVal===1);
        son.setPointerCapture(e.pointerId);
      });
      son.addEventListener('pointermove',e=>{
        if(!paintActive)return;
        const els=document.elementsFromPoint(e.clientX,e.clientY);
        for(const el of els){
          if(el!==son&&el.classList.contains('son')){
            const info=sonToCell.get(el);
            if(info&&seqState.on[info.ci][info.s]!==paintVal){
              seqState.on[info.ci][info.s]=paintVal;
              el.classList.toggle('on',paintVal===1);
            }
          }
        }
      });
      son.addEventListener('pointerup',()=>{paintActive=false;});
      son.addEventListener('pointercancel',()=>{paintActive=false;});
      son.addEventListener('touchstart',e=>{
        e.preventDefault();
        paintVal=seqState.on[ci][s]?0:1;
        paintActive=true;
        seqState.on[ci][s]=paintVal;
        son.classList.toggle('on',paintVal===1);
      },{passive:false});
 
      // ── DEG drag/wheel ─────────────────────────────────────
      const degWrap=document.createElement('div');
      degWrap.className='deg-wrap';
      degWrap.style.cssText=`height:${degH}px;min-height:${degH}px;width:100%;flex-shrink:0;`;
      const degEl=document.createElement('div');
      degEl.className='sdeg';
      degEl.style.fontSize=Math.max(9,Math.min(13,CW/3))+'px';
      degEl.textContent=seqState.deg[ci][s];
      degWrap.appendChild(degEl);
 
      const getDegMin=()=>ci===2?0:-(sz-1);
      const getDegMax=()=>ci===2?2:(sz-1);
      let dA=false,dY=0,dS=0;
      degWrap.addEventListener('pointerdown',e=>{
        dA=true;dY=e.clientY;dS=seqState.deg[ci][s];
        degWrap.setPointerCapture(e.pointerId);e.preventDefault();
      });
      degWrap.addEventListener('pointermove',e=>{
        if(!dA)return;
        const delta=Math.round((dY-e.clientY)/8);
        const nv=Math.max(getDegMin(),Math.min(getDegMax(),dS+delta));
        if(nv!==seqState.deg[ci][s]){seqState.deg[ci][s]=nv;degEl.textContent=nv;}
      });
      degWrap.addEventListener('pointerup',()=>dA=false);
      degWrap.addEventListener('pointercancel',()=>dA=false);
      degWrap.addEventListener('wheel',e=>{
        e.preventDefault();
        const nv=Math.max(getDegMin(),Math.min(getDegMax(),seqState.deg[ci][s]+(e.deltaY>0?-1:1)));
        seqState.deg[ci][s]=nv;degEl.textContent=nv;
      },{passive:false});
 
      // ── ACC ────────────────────────────────────────────────
      const acc=document.createElement('div');
      acc.className='sacc'+(seqState.acc[ci][s]?' on':'');
      acc.textContent=ci===2?'OP':'ACC';
      acc.style.cssText=`height:${accH}px;min-height:${accH}px;flex-shrink:0;font-size:${Math.max(7,Math.min(10,CW/3))}px;`;
      acc.addEventListener('click',()=>{seqState.acc[ci][s]^=1;acc.classList.toggle('on',!!seqState.acc[ci][s]);});
      acc.addEventListener('touchend',e=>{seqState.acc[ci][s]^=1;acc.classList.toggle('on',!!seqState.acc[ci][s]);e.preventDefault();});
 
      // ── CUT drag/wheel ─────────────────────────────────────
      const cutWrap=document.createElement('div');
      cutWrap.className='scut-wrap';
      cutWrap.style.cssText=`height:${cutH}px;min-height:${cutH}px;flex-shrink:0;`;
      const cutEl=document.createElement('div');
      cutEl.className='scut';
      cutEl.style.fontSize=Math.max(7,Math.min(10,CW/3.5))+'px';
      cutEl.textContent=seqState.cut[ci][s];
      cutWrap.appendChild(cutEl);
 
      let cA=false,cY2=0,cS2=0;
      cutWrap.addEventListener('pointerdown',e=>{
        cA=true;cY2=e.clientY;cS2=seqState.cut[ci][s];
        cutWrap.setPointerCapture(e.pointerId);e.preventDefault();
      });
      cutWrap.addEventListener('pointermove',e=>{
        if(!cA)return;
        const nv=Math.max(0,Math.min(127,Math.round(cS2+(cY2-e.clientY)*.5)));
        seqState.cut[ci][s]=nv;cutEl.textContent=nv;
      });
      cutWrap.addEventListener('pointerup',()=>cA=false);
      cutWrap.addEventListener('pointercancel',()=>cA=false);
      cutWrap.addEventListener('wheel',e=>{
        e.preventDefault();
        const nv=Math.max(0,Math.min(127,seqState.cut[ci][s]+(e.deltaY>0?-1:1)));
        seqState.cut[ci][s]=nv;cutEl.textContent=nv;
      },{passive:false});
 
      cell.appendChild(son);
      cell.appendChild(degWrap);
      cell.appendChild(acc);
      cell.appendChild(cutWrap);
      row.appendChild(cell);
      stepCells[ci][s]={son,degEl,degWrap,acc,cut:cutEl};
    }
    wrap.appendChild(row);
  });
 
  // Touch slide-paint
  let tPainting=false,tPaintVal=0;
  wrap.addEventListener('touchstart',()=>{tPainting=false;},{passive:true});
  wrap.addEventListener('touchmove',e=>{
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    if(el&&el.classList.contains('son')){
      if(!tPainting){tPainting=true;tPaintVal=el.classList.contains('on')?0:1;}
      if(tPaintVal!==(el.classList.contains('on')?1:0)){
        el.classList.toggle('on',tPaintVal===1);
        const info=sonToCell.get(el);if(info)seqState.on[info.ci][info.s]=tPaintVal;
      }
    }
  },{passive:true});
}
 
function refreshLenMarkers(ci){
  if(!stepCells[ci])return;
  for(let s=0;s<seqLen;s++){
    const c=stepCells[ci][s];if(!c)continue;
    const cell=c.son.parentElement;if(!cell)continue;
    cell.classList.toggle('past',s>=chLen[ci]);
    cell.classList.toggle('lend',s===chLen[ci]-1);
  }
}
 
/* ═══════════════════════════════════════════════════════════
   PATTERN BANK — 8 slots, all pre-initialized, long-press to save
═══════════════════════════════════════════════════════════ */
function makeDefaultSnap(){
  return{
    seq:JSON.parse(JSON.stringify(mkSeq())),
    len:[16,16,16,16,16,16,16,16],
    scale:'minor',
    oct:{...OCT},
    params:{...P},
    chordWT,
    chordHarm,
    mute:[...muteState],
    solo:[...soloState],
    bpm
  };
}
const bank=Array.from({length:BANK_SIZE},()=>makeDefaultSnap());
let curPat=0;

function snapshotCurrent(){
  return{
    seq:JSON.parse(JSON.stringify(seqState)),
    len:[...chLen],
    scale:scaleKey,
    oct:{...OCT},
    params:{...P},
    chordWT,
    chordHarm,
    mute:[...muteState],
    solo:[...soloState],
    bpm
  };
}
function restoreSnapshot(snap){
  if(!snap)return;
  Object.assign(seqState,JSON.parse(JSON.stringify(snap.seq)));
  snap.len.forEach((l,ci)=>{chLen[ci]=l;});
  if(snap.scale&&SCALES[snap.scale])scaleKey=snap.scale;
  if(snap.oct)Object.assign(OCT,snap.oct);
  if(snap.params)Object.assign(P,snap.params);
  if(snap.chordWT!==undefined)chordWT=snap.chordWT;
  if(snap.chordHarm!==undefined)chordHarm=snap.chordHarm;
  if(snap.mute)snap.mute.forEach((m,ci)=>muteState[ci]=m);
  if(snap.solo)snap.solo.forEach((s,ci)=>soloState[ci]=s);
  if(snap.bpm)setBPM(snap.bpm);
}
 
let hintTimer=null;
function buildPatBtns(){
  const wrap=document.getElementById('patBtns');
  wrap.innerHTML = '';
  for(let i=0;i<BANK_SIZE;i++){
    const btn=document.createElement('div');
    btn.className='pat-btn'+(i===curPat?' active':'');
    btn.id='pat'+i;btn.textContent=i+1;
    if(bank[i])btn.classList.add('filled');
    wrap.appendChild(btn);
 
    btn.onclick=()=>{
      if(i===curPat)return;
      savePat(curPat);
      loadPat(i);
    };
  }
}
 
function savePat(i){
  bank[i]=snapshotCurrent();
  document.getElementById('pat'+i).classList.add('filled');
  setMsg('SAVED → '+(i+1));
}
 
function loadPat(i){
  if(!bank[i]){setMsg('SLOT '+(i+1)+' EMPTY');return;}
  restoreSnapshot(bank[i]);
  document.querySelectorAll('.scl-btn').forEach((b,bi)=>{
    b.classList.toggle('active',Object.keys(SCALES)[bi]===scaleKey);
  });
  
  // Refresh UI elements
  uiRefresh.forEach(fn=>fn());
  updateMuteVis();

  buildTopNums();buildSeqRows();
  for(let ci=0;ci<8;ci++){
    refreshLenMarkers(ci);
    for(let s=0;s<seqLen;s++){
      const c=stepCells[ci]?.[s];if(!c)continue;
      c.son.classList.toggle('on',!!seqState.on[ci][s]);
      c.degEl.textContent=seqState.deg[ci][s];
      c.acc.classList.toggle('on',!!seqState.acc[ci][s]);
      c.cut.textContent=seqState.cut[ci][s];
    }
  }
  document.querySelectorAll('.pat-btn').forEach((b,bi)=>b.classList.toggle('active',bi===i));
  curPat=i;setMsg('LOADED '+(i+1));
}
 
/* ═══════════════════════════════════════════════════════════
   SAVE / LOAD FULL BANK
═══════════════════════════════════════════════════════════ */
function saveBank(name){
  const fn = name ? (name.endsWith('.json') ? name : name + '.json') : 'GUR-V1_bank_'+Date.now()+'.json';
  const data=JSON.stringify({bank,version:2},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=fn;a.click();URL.revokeObjectURL(a.href);
  setMsg('PROJECT SAVED');
}
function loadBank(){
  startAudio();
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.bank&&Array.isArray(data.bank)){
          data.bank.forEach((snap,i)=>{if(i<BANK_SIZE&&snap)bank[i]=snap;});
          for(let i=0;i<BANK_SIZE;i++){
            const b=document.getElementById('pat'+i);
            if(b)b.classList.toggle('filled',!!bank[i]);
          }
          loadPat(curPat);
          setMsg('PROJECT LOADED');
        }
      }catch(err){setMsg('LOAD ERR');}
    };
    reader.readAsText(file);
  };
  inp.click();
}

async function saveProject() {
  await startAudio();
  const name = prompt("Project Name:", "GUR-V1_Project");
  if (name) {
    saveBank(name);
    return true;
  }
  return false;
}

async function newProject() {
  await startAudio();
  if (confirm("Save current project before creating new?")) {
     const saved = await saveProject();
     if (!saved && !confirm("Project not saved. Create new anyway?")) return;
  }
  // Reset
  for(let i=0;i<BANK_SIZE;i++) bank[i]=makeDefaultSnap();
  
  // Update visual indicators for filled slots (all should be filled now as they are defaults)
  for(let i=0;i<BANK_SIZE;i++){
    const btn=document.getElementById('pat'+i);
    if(btn) btn.classList.add('filled');
  }

  loadPat(0);
  setMsg('NEW PROJECT CREATED');
}

/* ═══════════════════════════════════════════════════════════
   AUTO-BACKUP — localStorage persistence
═══════════════════════════════════════════════════════════ */
const BACKUP_KEY='GUR_V1_backup';

function makeFullBackup(){
  // Ensure current pattern is saved to bank before backing up
  bank[curPat]=snapshotCurrent();
  return JSON.stringify({
    bank,
    curPat,
    bpm,
    scaleKey,
    chordWT,
    chordHarm,
    currentTheme,
    ts:Date.now(),
    version:2
  });
}

function saveBackup(){
  try{
    localStorage.setItem(BACKUP_KEY,makeFullBackup());
  }catch(e){/* storage full or unavailable */}
}

function loadBackup(data){
  if(data.bank&&Array.isArray(data.bank)){
    data.bank.forEach((snap,i)=>{if(i<BANK_SIZE&&snap)bank[i]=snap;});
  }
  if(data.scaleKey&&SCALES[data.scaleKey])scaleKey=data.scaleKey;
  if(data.chordWT!==undefined)chordWT=data.chordWT;
  if(data.chordHarm!==undefined)chordHarm=data.chordHarm;
  if(data.bpm)setBPM(data.bpm);
  if(data.currentTheme&&THEMES[data.currentTheme])setTheme(data.currentTheme);
  loadPat(data.curPat||0);
  // Refresh scale buttons
  document.querySelectorAll('.scl-btn').forEach((b,bi)=>{
    b.classList.toggle('active',Object.keys(SCALES)[bi]===scaleKey);
  });
  buildPatBtns();
}

function clearBackup(){
  try{localStorage.removeItem(BACKUP_KEY);}catch(e){}
}

// Auto-save on exit/refresh
window.addEventListener('beforeunload',()=>{saveBackup();});
// Also periodic backup every 30s while playing
setInterval(()=>{if(playing)saveBackup();},30000);

// Check for backup on load
(function checkBackup(){
  try{
    const raw=localStorage.getItem(BACKUP_KEY);
    if(!raw)return;
    const data=JSON.parse(raw);
    if(!data||!data.bank)return;
    const age=Date.now()-data.ts;
    const mins=Math.floor(age/60000);
    const timeAgo=mins<1?'just now':mins<60?mins+'m ago':Math.floor(mins/60)+'h '+mins%60+'m ago';
    // Show restore prompt
    const ov=document.getElementById('backupOverlay');
    document.getElementById('backupAge').textContent=timeAgo;
    ov.classList.add('open');
    document.getElementById('backupRestore').onclick=()=>{
      ov.classList.remove('open');
      loadBackup(data);
      setMsg('BACKUP RESTORED');
    };
    document.getElementById('backupNew').onclick=()=>{
      ov.classList.remove('open');
      clearBackup();
      setMsg('NEW SESSION');
    };
  }catch(e){}
})();
</script>
